<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Friend - Sukoon</title>
    <meta name="description" content="A compassionate AI companion who listens without judgment. No records, no accounts, just a friend.">
    <meta name="theme-color" content="#2D6A4F">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shell.css">
    <style>
        body {
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .topbar-status {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.74rem; color: #86868B; font-weight: 500;
        }
        .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #2D6A4F;
            animation: pulse-dot 2.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        /* ===================== CRISIS BANNER ===================== */
        .crisis-banner {
            position: fixed; top: 52px; left: 0; right: 0; z-index: 999;
            padding: 5px 16px;
            background: rgba(250,250,247,0.9);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.04);
            text-align: center;
            font-size: 0.68rem; color: #86868B;
        }
        .crisis-banner a {
            color: #2D6A4F; font-weight: 600;
            transition: color 0.2s;
        }
        .crisis-banner a:hover { color: #1B4332; }

        /* ===================== DESKTOP SIDEBAR ===================== */
        @media (min-width: 961px) {
            .chat-page {
                margin-left: 220px;
            }
            .crisis-banner {
                left: 220px;
            }
            .chat-input-area {
                left: 220px;
            }
        }

        /* ===================== CHAT PAGE LAYOUT ===================== */
        .chat-page {
            display: flex; flex-direction: column;
            height: 100vh;
            padding-top: 82px;
            padding-bottom: 0;
            width: 100%;
            position: relative;
        }

        /* ===================== WELCOME STATE ===================== */
        .welcome-state {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex: 1; padding: 24px 20px;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }
        .welcome-state.hidden { display: none; }
        .welcome-title {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2rem, 5vw, 2.8rem);
            color: #1D1D1F; margin-bottom: 2px;
            line-height: 1.15; font-weight: 400;
            letter-spacing: -0.02em;
        }
        .welcome-title-hi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: clamp(0.9rem, 2.2vw, 1.05rem);
            color: #2D6A4F; font-weight: 400;
            margin-bottom: 8px;
        }
        .welcome-subtitle {
            font-size: 0.9rem; color: #86868B;
            max-width: 320px; margin-bottom: 32px;
            line-height: 1.5;
        }
        .starter-pills {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 10px; max-width: 440px;
        }
        .starter-pill {
            padding: 10px 18px;
            background: #FFFFFF;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 50px;
            font-size: 0.84rem; color: #1D1D1F;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: -apple-system, 'Inter', sans-serif;
            white-space: nowrap;
        }
        .starter-pill:hover {
            background: #F5F5F0;
            border-color: #2D6A4F;
            color: #1B4332;
        }
        .starter-pill:active {
            transform: scale(0.97);
        }

        /* ===================== MESSAGES AREA ===================== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 8px;
            display: none;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        .chat-messages.active { display: flex; }
        .chat-messages::-webkit-scrollbar { width: 3px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 3px; }

        .msg {
            max-width: 78%;
            padding: 14px 18px;
            font-size: 0.9rem;
            line-height: 1.65;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
            position: relative;
        }

        .msg-user {
            align-self: flex-end;
            background: #2D6A4F;
            color: #FFFFFF;
            border-radius: 16px;
            border-bottom-right-radius: 4px;
        }

        .msg-assistant {
            align-self: flex-start;
            background: #F5F5F0;
            color: #1D1D1F;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .msg-time {
            font-size: 0.62rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 6px;
            text-align: right;
        }
        .msg-assistant .msg-time { color: #86868B; text-align: left; }

        /* Typing indicator */
        .typing-indicator {
            align-self: flex-start;
            display: none;
            align-items: center;
            gap: 5px;
            padding: 14px 20px;
            background: #F5F5F0;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }
        .typing-indicator.show { display: flex; }
        .typing-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #86868B;
            animation: typeBounce 1.4s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.16s; }
        .typing-dot:nth-child(3) { animation-delay: 0.32s; }
        @keyframes typeBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-5px); opacity: 0.8; }
        }

        /* Error message */
        .msg-error {
            align-self: flex-start;
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.12);
            color: #B91C1C;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        /* ===================== SUGGESTION CARD ===================== */
        .suggestion-card {
            align-self: flex-start;
            max-width: 78%;
            margin-top: -4px;
            animation: fadeIn 0.3s ease 0.1s both;
        }
        .suggestion-card a {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px;
            background: rgba(45,106,79,0.04);
            border: 1px solid rgba(45,106,79,0.12);
            border-radius: 12px;
            color: #2D6A4F; font-size: 0.82rem; font-weight: 500;
            transition: all 0.2s ease;
        }
        .suggestion-card a:hover {
            background: rgba(45,106,79,0.08);
            border-color: rgba(45,106,79,0.2);
        }
        .suggestion-card svg { width: 18px; height: 18px; flex-shrink: 0; color: #2D6A4F; }
        .suggestion-arrow { margin-left: auto; font-size: 1rem; }

        /* ===================== INPUT AREA ===================== */
        .chat-input-area {
            position: fixed;
            bottom: 56px;
            left: 0; right: 0;
            z-index: 900;
            padding: 8px 16px 10px;
            background: rgba(250,250,247,0.85);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(0,0,0,0.04);
        }
        .input-wrapper {
            max-width: 800px; margin: 0 auto;
        }
        .privacy-inline {
            text-align: center;
            font-size: 0.65rem; color: #86868B;
            margin-bottom: 6px;
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .privacy-inline svg { width: 10px; height: 10px; color: #86868B; }
        .input-row {
            display: flex; gap: 10px;
        }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 14px;
            font-family: -apple-system, 'Inter', sans-serif;
            font-size: 0.9rem;
            color: #1D1D1F;
            background: #FFFFFF;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            line-height: 1.5;
        }
        .chat-input::placeholder { color: #86868B; }
        .chat-input:focus {
            border-color: #2D6A4F;
            box-shadow: 0 0 0 3px rgba(45,106,79,0.08);
        }
        .send-btn {
            width: 48px; height: 48px;
            border-radius: 14px;
            border: none;
            background: #2D6A4F;
            color: #fff;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .send-btn:hover {
            background: #1B4332;
        }
        .send-btn:disabled {
            background: rgba(0,0,0,0.06);
            color: #86868B;
            cursor: not-allowed;
        }
        .send-btn svg { width: 20px; height: 20px; }

        /* ===================== RESPONSIVE ===================== */
        @media (max-width: 600px) {
            .topbar { padding: 0 1rem; }
            .chat-messages { padding: 12px 12px 8px; }
            .msg { max-width: 88%; font-size: 0.87rem; padding: 12px 16px; }
            .chat-input-area { padding: 6px 12px 8px; }
            .chat-input { padding: 11px 14px; font-size: 0.88rem; }
            .send-btn { width: 44px; height: 44px; }
            .starter-pills { gap: 8px; }
            .starter-pill { padding: 9px 15px; font-size: 0.8rem; }
        }
    </style>
</head>

    <!-- ==================== CHAT PAGE ==================== -->
    <div class="chat-page">

        <!-- WELCOME STATE -->
        <div class="welcome-state" id="welcomeState">
            <h1 class="welcome-title">Sukoon</h1>
            <p class="welcome-title-hi">&#2360;&#2369;&#2325;&#2370;&#2344; &#2360;&#2375; &#2348;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;</p>
            <p class="welcome-subtitle">A companion for peace of mind. Share what you're feeling -- no judgement, no records.</p>
            <div class="starter-pills" id="starterPills">
                <button class="starter-pill" data-msg="I can't sleep tonight">I can't sleep tonight</button>
                <button class="starter-pill" data-msg="I'm feeling anxious">I'm feeling anxious</button>
                <button class="starter-pill" data-msg="I need motivation">I need motivation</button>
                <button class="starter-pill" data-msg="I want to talk">I want to talk</button>
                <button class="starter-pill" data-msg="Help me calm down">Help me calm down</button>
            </div>
        </div>

        <!-- MESSAGES AREA -->
        <div class="chat-messages" id="chatMessages">
            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>
    </div>

    <!-- ==================== INPUT AREA ==================== -->
    <div class="chat-input-area">
        <div class="input-wrapper">
            <div class="privacy-inline">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                Conversations are private. Nothing is stored.
            </div>
            <div class="input-row">
                <input type="text" class="chat-input" id="chatInput" placeholder="Share what's on your mind..." autocomplete="off" autofocus>
                <button class="send-btn" id="sendBtn" disabled aria-label="Send">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="/js/sukoon-engine.js"></script>
    <script>
    (function() {
        'use strict';

        var messages = [];
        var isLoading = false;
        var lang = 'en';
        var chatStarted = false;

        var chatMessages = document.getElementById('chatMessages');
        var chatInput = document.getElementById('chatInput');
        var sendBtn = document.getElementById('sendBtn');
        var typingEl = document.getElementById('typingIndicator');
        var welcomeState = document.getElementById('welcomeState');
        var starterPills = document.getElementById('starterPills');

        // -- Language --
        var langPicker = document.getElementById('langPicker');
        if (langPicker) {
            langPicker.addEventListener('change', function(e) {
                lang = e.target.value;
            });
        }

        // -- Starter Pills --
        starterPills.addEventListener('click', function(e) {
            var pill = e.target.closest('.starter-pill');
            if (pill && pill.dataset.msg) {
                chatInput.value = pill.dataset.msg;
                sendMessage();
            }
        });

        // -- Input Handling --
        chatInput.addEventListener('input', function() {
            sendBtn.disabled = chatInput.value.trim() === '' || isLoading;
        });

        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey && !isLoading && chatInput.value.trim()) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', function() {
            if (!isLoading && chatInput.value.trim()) sendMessage();
        });

        function startChat() {
            if (!chatStarted) {
                chatStarted = true;
                welcomeState.classList.add('hidden');
                chatMessages.classList.add('active');
            }
        }

        function sendMessage() {
            var text = chatInput.value.trim();
            if (!text) return;

            startChat();

            // Track with sukoon engine (once per session)
            if(window.sukoon && !window._sukoonFriendTracked) { window._sukoonFriendTracked = true; sukoon.track('meditation', 5, 'AI Friend Chat'); }

            messages.push({ role: 'user', content: text });
            appendMsg('user', text);
            chatInput.value = '';
            sendBtn.disabled = true;
            chatInput.focus();

            showTyping();
            isLoading = true;

            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: messages, language: lang })
            })
            .then(function(res) {
                if (!res.ok) throw new Error('Server error: ' + res.status);
                return res.json();
            })
            .then(function(data) {
                hideTyping();
                isLoading = false;
                if (data.error) {
                    appendMsg('error', data.error);
                } else {
                    var reply = data.message || data.reply || 'I hear you.';
                    messages.push({ role: 'assistant', content: reply });
                    appendMsg('assistant', reply);
                    showSuggestion();
                }
                sendBtn.disabled = chatInput.value.trim() === '';
            })
            .catch(function(err) {
                hideTyping();
                isLoading = false;
                appendMsg('error', 'I had trouble connecting. Please check your internet and try again. If this persists, the server may be temporarily unavailable.');
                sendBtn.disabled = chatInput.value.trim() === '';
                console.error('Chat error:', err);
            });
        }

        function appendMsg(role, text) {
            var div = document.createElement('div');
            var cls = role === 'user' ? 'msg-user' : role === 'error' ? 'msg-error' : 'msg-assistant';
            div.className = 'msg ' + cls;

            var now = new Date();
            var time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

            var escaped = escapeHTML(text);
            escaped = escaped.replace(/\n/g, '<br>');

            div.innerHTML = '<div>' + escaped + '</div><div class="msg-time">' + time + '</div>';

            // Insert before typing indicator
            chatMessages.insertBefore(div, typingEl);
            scrollToBottom();
        }

        function showSuggestion() {
            // Remove any existing suggestion
            var existing = chatMessages.querySelector('.suggestion-card');
            if (existing) existing.remove();

            var card = document.createElement('div');
            card.className = 'suggestion-card';
            card.innerHTML = '<a href="/breathe.html">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c-4-3.5-8-7.5-8-12a8 8 0 0116 0c0 4.5-4 8.5-8 12z"/><circle cx="12" cy="10" r="3"/></svg>' +
                '<span>Try a 5-min breathing exercise</span>' +
                '<span class="suggestion-arrow">&rarr;</span>' +
                '</a>';
            chatMessages.insertBefore(card, typingEl);
            scrollToBottom();
        }

        function showTyping() {
            typingEl.classList.add('show');
            scrollToBottom();
        }

        function hideTyping() {
            typingEl.classList.remove('show');
        }

        function scrollToBottom() {
            requestAnimationFrame(function() {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        function escapeHTML(s) {
            var d = document.createElement('div');
            d.appendChild(document.createTextNode(s));
            return d.innerHTML;
        }

        // Focus on load
        chatInput.focus();
    })();
    </script>
    <script src="/js/i18n.js"></script>
    <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js');</script>
    <script src="/js/shell.js"></script>
</body>
