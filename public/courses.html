<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guided Courses - Sukoon</title>
    <meta name="description" content="Structured meditation programs to guide your journey. Mindfulness, anxiety relief, better sleep, focus training, grief healing, and self-love.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+Devanagari:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #F1F5F9;
            background: #0F172A;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            padding-bottom: 80px;
        }
        a { text-decoration: none; color: inherit; }

        /* ===================== STICKY HEADER ===================== */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            padding: 0 1.5rem; height: 64px;
            background: rgba(15,23,42,0.8);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .topbar-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 1.35rem; color: #F1F5F9;
            display: flex; align-items: center; gap: 0.5rem;
            letter-spacing: -0.01em;
        }

        /* ===================== BOTTOM NAV ===================== */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
            background: rgba(15,23,42,0.9);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: space-around;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .bottom-nav a {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            text-decoration: none; color: #64748B;
            font-size: 0.65rem; font-family: Inter, sans-serif;
            transition: color 0.2s;
        }
        .bottom-nav a:hover { color: #94A3B8; }

        /* ===================== DESKTOP SIDEBAR >900px ===================== */
        @media (min-width: 901px) {
            .bottom-nav {
                top: 64px; bottom: 0; left: 0; right: auto;
                width: 72px; height: auto;
                flex-direction: column; justify-content: flex-start;
                padding: 1.5rem 0; gap: 0.5rem;
                border-top: none; border-right: 1px solid rgba(255,255,255,0.06);
            }
            .bottom-nav a { padding: 0.6rem 0; }
            body { padding-left: 72px; padding-bottom: 0; }
        }

        /* ===================== PAGE CONTENT ===================== */
        .page-wrap {
            padding: 96px 1.5rem 2rem;
            max-width: 1040px; margin: 0 auto;
        }
        @media (min-width: 901px) {
            .page-wrap { padding-top: 104px; }
        }

        /* Header */
        .page-header {
            text-align: center; margin-bottom: 3rem;
            animation: fadeUp 0.6s ease both;
        }
        .page-title {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 400; color: #F1F5F9;
            letter-spacing: -0.02em; line-height: 1.15;
            margin-bottom: 0.6rem;
        }
        .page-sub {
            font-size: 1rem; color: #94A3B8;
            max-width: 440px; margin: 0 auto 0.3rem;
            line-height: 1.6;
        }
        .page-sub-hi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 0.85rem; color: #64748B;
            font-weight: 300;
        }

        /* ===================== COURSE GRID ===================== */
        .section-label {
            font-size: 0.68rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: #64748B; margin-bottom: 1rem;
            animation: fadeUp 0.6s ease 0.15s both;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
        }
        @media (max-width: 700px) {
            .course-grid { grid-template-columns: 1fr; }
        }

        .course-card {
            background: rgba(30,41,59,0.7);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 1.75rem;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .course-card:hover {
            border-color: rgba(124,58,237,0.3);
            box-shadow: 0 8px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(124,58,237,0.1);
            transform: translateY(-3px);
        }
        .course-card-accent {
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            border-radius: 20px 20px 0 0;
        }

        .course-card-head {
            display: flex; align-items: flex-start;
            justify-content: space-between; margin-bottom: 0.8rem;
        }
        .course-card-icon {
            width: 46px; height: 46px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; flex-shrink: 0;
            backdrop-filter: blur(8px);
        }
        .course-card-meta {
            display: flex; align-items: center; gap: 0.45rem;
        }
        .course-card-days {
            font-size: 0.68rem; font-weight: 600; color: #94A3B8;
            background: rgba(255,255,255,0.06); padding: 0.25rem 0.6rem;
            border-radius: 100px;
        }
        .course-card-level {
            font-size: 0.62rem; font-weight: 700; color: #7C3AED;
            text-transform: uppercase; letter-spacing: 0.06em;
            padding: 0.25rem 0.6rem; border-radius: 100px;
            background: rgba(124,58,237,0.12);
        }
        .course-card-level.intermediate { color: #F59E0B; background: rgba(245,158,11,0.12); }
        .course-card-level.all { color: #34D399; background: rgba(52,211,153,0.12); }

        .course-card-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.3rem; color: #F1F5F9;
            line-height: 1.3; margin-bottom: 0.15rem;
        }
        .course-card-title-hi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 0.78rem; color: #64748B;
            font-weight: 300; margin-bottom: 0.5rem;
        }
        .course-card-desc {
            font-size: 0.85rem; color: #94A3B8;
            line-height: 1.55; margin-bottom: 1rem;
        }

        .course-progress {
            display: flex; align-items: center; gap: 0.6rem;
            margin-bottom: 1rem;
        }
        .course-progress-bar {
            flex: 1; height: 4px;
            background: rgba(255,255,255,0.06); border-radius: 100px;
            overflow: hidden;
        }
        .course-progress-fill {
            height: 100%; border-radius: 100px;
            transition: width 0.5s ease;
        }
        .course-progress-text {
            font-size: 0.7rem; font-weight: 600; color: #64748B;
            white-space: nowrap;
        }
        .course-progress-text.complete { color: #34D399; }

        .course-card-btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.55rem 1.3rem; border-radius: 100px;
            font-size: 0.8rem; font-weight: 600;
            border: none; cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.22s ease;
            color: #fff;
        }
        .course-card-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
        .course-card-btn svg { width: 14px; height: 14px; }

        /* ===================== SESSION PLAYER OVERLAY ===================== */
        .player-overlay {
            position: fixed; inset: 0; z-index: 5000;
            background: rgba(15,23,42,0.97);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.45s ease;
        }
        .player-overlay.show { opacity: 1; pointer-events: auto; }

        .player-close {
            position: absolute; top: 1.25rem; right: 1.5rem;
            background: rgba(255,255,255,0.06); border: none;
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #94A3B8;
            transition: all 0.2s ease;
        }
        .player-close:hover { background: rgba(255,255,255,0.1); color: #F1F5F9; }
        .player-close svg { width: 20px; height: 20px; }

        /* Setup screen */
        .player-setup {
            display: flex; flex-direction: column;
            align-items: center; text-align: center;
            padding: 2rem; max-width: 520px; width: 100%;
        }
        .player-setup.hide { display: none; }

        .player-course-label {
            font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: #7C3AED; margin-bottom: 0.5rem;
        }
        .player-day-label {
            font-family: 'DM Serif Display', serif;
            font-size: 2.2rem; color: #F1F5F9;
            margin-bottom: 0.3rem;
        }
        .player-session-title {
            font-size: 0.95rem; color: #94A3B8;
            margin-bottom: 2rem;
        }

        .player-option-group { width: 100%; margin-bottom: 1.5rem; }
        .player-option-label {
            font-size: 0.68rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: #64748B; margin-bottom: 0.6rem;
        }
        .player-pills {
            display: flex; gap: 0.4rem;
            justify-content: center; flex-wrap: wrap;
        }
        .player-pill {
            padding: 0.5rem 1.1rem; border-radius: 100px;
            font-size: 0.82rem; font-weight: 500;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(30,41,59,0.6);
            color: #94A3B8; cursor: pointer;
            transition: all 0.22s ease;
            font-family: 'Inter', sans-serif;
        }
        .player-pill:hover { border-color: rgba(124,58,237,0.35); color: #C4B5FD; }
        .player-pill.active {
            background: #7C3AED; border-color: #7C3AED;
            color: #fff; box-shadow: 0 2px 12px rgba(124,58,237,0.35);
        }
        .player-pill-ambient.active {
            background: #059669; border-color: #059669;
            box-shadow: 0 2px 12px rgba(5,150,105,0.3);
        }

        .player-begin-btn {
            margin-top: 1rem;
            padding: 0.9rem 3rem; border-radius: 100px;
            background: linear-gradient(135deg, #7C3AED, #6D28D9);
            color: #fff;
            font-size: 1rem; font-weight: 600;
            border: none; cursor: pointer;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 20px rgba(124,58,237,0.35);
            transition: all 0.22s ease;
        }
        .player-begin-btn:hover {
            background: linear-gradient(135deg, #8B5CF6, #7C3AED);
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(124,58,237,0.45);
        }

        /* Active session screen */
        .player-session {
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
            padding: 2rem; width: 100%;
            min-height: 100vh; min-height: 100dvh;
            position: relative;
        }
        .player-session.show { display: flex; }

        .session-bg {
            position: absolute; inset: 0; z-index: 0;
            background: linear-gradient(170deg, #0F172A 0%, #1E1B4B 40%, #0F172A 100%);
            transition: background 0.8s ease;
        }
        .session-bg-orb {
            position: absolute; border-radius: 50%;
            filter: blur(100px); opacity: 0.12;
            animation: sessionOrb 20s ease-in-out infinite;
        }
        .session-bg-orb:nth-child(1) {
            width: 500px; height: 500px;
            background: #7C3AED; top: 10%; left: 15%;
        }
        .session-bg-orb:nth-child(2) {
            width: 400px; height: 400px;
            background: #F59E0B; bottom: 15%; right: 15%;
            animation-delay: 7s;
        }
        .session-bg-orb:nth-child(3) {
            width: 350px; height: 350px;
            background: #059669; top: 50%; left: 50%;
            animation-delay: 14s;
        }
        @keyframes sessionOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 15px) scale(0.95); }
        }

        .session-content {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            align-items: center;
            max-width: 580px; width: 100%;
        }
        .session-course-name {
            font-size: 0.68rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: rgba(255,255,255,0.35);
            margin-bottom: 2.5rem;
        }
        .session-timer {
            font-size: clamp(4rem, 12vw, 6.5rem);
            font-weight: 200; color: rgba(255,255,255,0.85);
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.04em; line-height: 1;
            margin-bottom: 2.5rem;
            transition: opacity 0.5s ease;
        }
        .session-prompt-wrap {
            min-height: 120px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            margin-bottom: 2.5rem;
        }
        .session-prompt {
            font-family: 'DM Serif Display', serif;
            font-style: italic;
            font-size: clamp(1.1rem, 2.8vw, 1.35rem);
            color: rgba(255,255,255,0.8);
            line-height: 1.65; max-width: 460px;
            opacity: 1;
            transition: opacity 0.8s ease;
        }
        .session-prompt.fade { opacity: 0; }

        .session-dots {
            display: flex; gap: 0.4rem;
            margin-bottom: 2rem;
        }
        .session-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(255,255,255,0.12);
            transition: all 0.4s ease;
        }
        .session-dot.active { background: rgba(124,58,237,0.8); transform: scale(1.3); }
        .session-dot.done { background: rgba(124,58,237,0.4); }

        .session-pause-btn {
            padding: 0.65rem 1.8rem; border-radius: 100px;
            background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6);
            font-size: 0.8rem; font-weight: 500;
            border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            backdrop-filter: blur(8px);
        }
        .session-pause-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        /* ===================== SESSION COMPLETE SCREEN ===================== */
        .player-complete {
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 2rem;
            max-width: 520px; width: 100%;
        }
        .player-complete.show { display: flex; }

        .complete-icon {
            width: 80px; height: 80px; margin-bottom: 1.5rem;
        }
        .complete-icon svg { width: 100%; height: 100%; }

        .complete-title {
            font-family: 'DM Serif Display', serif;
            font-size: 2.4rem; color: #F1F5F9;
            margin-bottom: 0.3rem;
        }
        .complete-sub {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 0.95rem; color: #64748B;
            font-weight: 300; margin-bottom: 2rem;
        }
        .complete-quote {
            font-family: 'DM Serif Display', serif;
            font-style: italic; font-size: 1.1rem;
            color: #94A3B8; line-height: 1.6;
            max-width: 420px; margin-bottom: 0.4rem;
        }
        .complete-quote-author {
            font-size: 0.78rem; color: #64748B;
            margin-bottom: 2.5rem;
        }
        .complete-actions {
            display: flex; gap: 0.75rem;
            flex-wrap: wrap; justify-content: center;
        }
        .complete-btn-primary {
            padding: 0.82rem 2rem; border-radius: 100px;
            background: linear-gradient(135deg, #7C3AED, #6D28D9);
            color: #fff;
            font-size: 0.9rem; font-weight: 600;
            border: none; cursor: pointer;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 2px 14px rgba(124,58,237,0.3);
            transition: all 0.22s ease;
        }
        .complete-btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .complete-btn-ghost {
            padding: 0.75rem 1.5rem; border-radius: 100px;
            background: rgba(30,41,59,0.6);
            color: #94A3B8;
            font-size: 0.85rem; font-weight: 500;
            border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }
        .complete-btn-ghost:hover { border-color: rgba(255,255,255,0.15); background: rgba(30,41,59,0.8); color: #F1F5F9; }
        .complete-next {
            margin-top: 1.5rem;
            font-size: 0.78rem; color: #64748B;
        }
        .complete-next strong { color: #94A3B8; }

        /* ===================== ANIMATIONS ===================== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stagger-1 { animation: fadeUp 0.5s ease 0.1s both; }
        .stagger-2 { animation: fadeUp 0.5s ease 0.18s both; }
        .stagger-3 { animation: fadeUp 0.5s ease 0.26s both; }
        .stagger-4 { animation: fadeUp 0.5s ease 0.34s both; }
        .stagger-5 { animation: fadeUp 0.5s ease 0.42s both; }
        .stagger-6 { animation: fadeUp 0.5s ease 0.50s both; }
    </style>
</head>

<!-- ===================== MAIN ===================== -->
<main class="page-wrap">

    <!-- Header -->
    <div class="page-header">
        <h1 class="page-title">Guided Courses</h1>
        <p class="page-sub">Structured paths to inner peace. One day at a time.</p>
        <p class="page-sub-hi">&#x0936;&#x093E;&#x0902;&#x0924;&#x093F; &#x0915;&#x0947; &#x0938;&#x0941;&#x0935;&#x094D;&#x092F;&#x0935;&#x0938;&#x094D;&#x0925;&#x093F;&#x0924; &#x092E;&#x093E;&#x0930;&#x094D;&#x0917;&#x0964; &#x090F;&#x0915; &#x0926;&#x093F;&#x0928; &#x090F;&#x0915; &#x0915;&#x0926;&#x092E;&#x0964;</p>
    </div>

    <!-- Course Library -->
    <div class="section-label">All Courses &nbsp;&middot;&nbsp; &#x0938;&#x092D;&#x0940; &#x092A;&#x093E;&#x0920;&#x094D;&#x092F;&#x0915;&#x094D;&#x0930;&#x092E;</div>
    <div class="course-grid" id="courseGrid"></div>

</main>

<!-- ===================== SESSION PLAYER OVERLAY ===================== -->
<div class="player-overlay" id="playerOverlay">
    <button class="player-close" id="playerClose">
        <svg viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>

    <!-- Setup Screen -->
    <div class="player-setup" id="playerSetup">
        <div class="player-course-label" id="playerCourseLabel"></div>
        <div class="player-day-label" id="playerDayLabel"></div>
        <div class="player-session-title" id="playerSessionTitle"></div>

        <div class="player-option-group">
            <div class="player-option-label">Duration &nbsp;&middot;&nbsp; &#x0905;&#x0935;&#x0927;&#x093F;</div>
            <div class="player-pills" id="durationPills">
                <button class="player-pill" data-dur="300">5 min</button>
                <button class="player-pill active" data-dur="600">10 min</button>
                <button class="player-pill" data-dur="900">15 min</button>

/* ===================== HELPERS ===================== */
function getCourseDay(id) {
    return parseInt(localStorage.getItem('sukoon-course-' + id + '-day') || '1', 10);
}
function setCourseDay(id, d) {
    localStorage.setItem('sukoon-course-' + id + '-day', String(d));
}
function isDayDone(id, d) {
    return localStorage.getItem('sukoon-course-' + id + '-day-' + d + '-done') === 'true';
}
function markDayDone(id, d) {
    localStorage.setItem('sukoon-course-' + id + '-day-' + d + '-done', 'true');
}
function getCompletedDays(id) {
    var count = 0;
    var c = COURSES[id];
    for (var d = 1; d <= c.days; d++) { if (isDayDone(id, d)) count++; }
    return count;
}
function isCourseComplete(id) {
    return getCompletedDays(id) >= COURSES[id].days;
}

/* ===================== BELL SOUND (Web Audio 528Hz) ===================== */
function playBell() {
    var ctx = playerState.audioCtx;
    if (!ctx) return;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 528;
    gain.gain.setValueAtTime(0.35, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3.5);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 4);
}

/* ===================== AMBIENT SOUND ===================== */
function startAmbient() {
    if (playerState.ambient === 'silence') return;
    var ctx = playerState.audioCtx;
    if (!ctx) return;

    var file = '/audio/' + playerState.ambient + '.wav';
    fetch(file).then(function(res) {
        if (!res.ok) throw new Error('No ambient file');
        return res.arrayBuffer();
    }).then(function(buf) {
        return ctx.decodeAudioData(buf);
    }).then(function(audioBuffer) {
        var src = ctx.createBufferSource();
        src.buffer = audioBuffer;
        src.loop = true;
        var gain = ctx.createGain();
        gain.gain.value = 0.2;
        src.connect(gain);
        gain.connect(ctx.destination);
        src.start();
        playerState.ambientSource = src;
        playerState.ambientGain = gain;
    }).catch(function() { /* no ambient file available */ });
}

function stopAmbient() {
    if (playerState.ambientSource) {
        try { playerState.ambientSource.stop(); } catch(e) {}
        playerState.ambientSource = null;
    }
}

/* ===================== BEGIN SESSION ===================== */
document.getElementById('playerBeginBtn').addEventListener('click', function() {
    // Init audio context on user gesture
    if (!playerState.audioCtx) {
        playerState.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    var c = COURSES[playerState.courseId];
    var prompts = c.sessions[playerState.day].prompts;
    var duration = playerState.duration;

    $setup.classList.add('hide');
    $session.classList.add('show');

    document.getElementById('sessionCourseName').textContent = c.title + '  \u2022  Day ' + playerState.day + ' of ' + c.days;

    // Build dots
    var dotsHtml = '';
    for (var i = 0; i < prompts.length; i++) dotsHtml += '<div class="session-dot"></div>';
    document.getElementById('sessionDots').innerHTML = dotsHtml;

    playerState.remaining = duration;
    playerState.paused = false;
    playerState.promptIndex = 0;
    document.getElementById('sessionPauseBtn').textContent = 'Pause';

    // Play opening bell
    playBell();

    // Start ambient
    startAmbient();

    // Show first prompt after short delay (after bell)
    setTimeout(function() {
        showPrompt(prompts, 0);
    }, 1500);

    // Timer
    updateTimerDisplay();
    playerState.timer = setInterval(function() {
        if (playerState.paused) return;
        playerState.remaining--;
        updateTimerDisplay();
        if (playerState.remaining <= 0) {
            endSession();
        }
    }, 1000);

    // Prompt rotation
    var promptInterval = Math.floor((duration * 1000) / prompts.length);
    if (promptInterval < 8000) promptInterval = 8000; // minimum 8s per prompt
    playerState.promptTimer = setInterval(function() {
        if (playerState.paused) return;
        var nextIdx = playerState.promptIndex + 1;
        if (nextIdx < prompts.length) {
            showPrompt(prompts, nextIdx);
        }
    }, promptInterval);
});

function showPrompt(prompts, idx) {
    var $prompt = document.getElementById('sessionPrompt');
    $prompt.classList.add('fade');
    setTimeout(function() {
        playerState.promptIndex = idx;
        $prompt.textContent = prompts[idx];
        $prompt.classList.remove('fade');
        // Update dots
        var dots = document.querySelectorAll('.session-dot');
        dots.forEach(function(d, i) {
            d.classList.remove('active', 'done');
            if (i < idx) d.classList.add('done');
            if (i === idx) d.classList.add('active');
        });
    }, 800);
}

function updateTimerDisplay() {
    var r = playerState.remaining;
    var m = Math.floor(r / 60);
    var s = r % 60;
    document.getElementById('sessionTimer').textContent = m + ':' + String(s).padStart(2, '0');
}

/* Pause */
document.getElementById('sessionPauseBtn').addEventListener('click', function() {
    playerState.paused = !playerState.paused;
    this.textContent = playerState.paused ? 'Resume' : 'Pause';
});

/* ===================== END SESSION ===================== */
function endSession() {
    clearInterval(playerState.timer);
    clearInterval(playerState.promptTimer);
    playerState.timer = null;
    playerState.promptTimer = null;

    // Play closing bell
    playBell();

    // Fade out ambient
    if (playerState.ambientGain) {
        playerState.ambientGain.gain.linearRampToValueAtTime(0, playerState.audioCtx.currentTime + 2);
        setTimeout(stopAmbient, 2500);
    }

    // Show complete screen after a moment
    setTimeout(function() {
        $session.classList.remove('show');
        $complete.classList.add('show');

        var q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
        document.getElementById('completeQuote').textContent = '\u201C' + q.text + '\u201D';
        document.getElementById('completeAuthor').textContent = '\u2014 ' + q.author;

        var c = COURSES[playerState.courseId];
        var nextDay = playerState.day + 1;
        if (nextDay <= c.days) {
            document.getElementById('completeNext').innerHTML = 'Next: <strong>Day ' + nextDay + ' \u2014 ' + c.sessions[nextDay].title + '</strong>';
        } else {
            document.getElementById('completeNext').innerHTML = '<strong>Course Complete!</strong>';
        }
    }, 2000);
}

function stopSession() {
    clearInterval(playerState.timer);
    clearInterval(playerState.promptTimer);
    playerState.timer = null;
    playerState.promptTimer = null;
    stopAmbient();
}

/* Mark Complete */
document.getElementById('completeMarkBtn').addEventListener('click', function() {
    var cid = playerState.courseId;
    var day = playerState.day;
    markDayDone(cid, day);

    var c = COURSES[cid];
    var nextDay = day + 1;
    if (nextDay <= c.days && !isDayDone(cid, nextDay)) {
        setCourseDay(cid, nextDay);
    } else if (isCourseComplete(cid)) {
        // Course finished
    }

    closePlayer();
});

/* ===================== INIT ===================== */
renderGrid();

})();
</script>
</body>
