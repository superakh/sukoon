    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+Devanagari:wght@300;400;500&display=swap" rel="stylesheet">

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, 'Inter', BlinkMacSystemFont, sans-serif;
            color: #1D1D1F;
            background: #FAFAF7;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            padding-bottom: 80px;
        }
        a { text-decoration: none; color: inherit; }

        /* ===================== STICKY HEADER ===================== */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            padding: 0 1.5rem; height: 52px;
            background: rgba(250,250,247,0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }
        .topbar-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 1.25rem; color: #1D1D1F;
            letter-spacing: -0.01em;
        }

        /* ===================== PAGE CONTENT ===================== */
        .page-wrap {
            padding: 80px 1.5rem 2rem;
            max-width: 960px; margin: 0 auto;
        }

        /* ===================== DESKTOP SIDEBAR >960px ===================== */
        @media (min-width: 961px) {
            .topbar { justify-content: flex-start; padding-left: 2rem; left: 220px; }
            body { padding-left: 220px; padding-bottom: 0; }
            .page-wrap { padding-top: 80px; max-width: 840px; }
        }

        /* Header */
        .page-header {
            text-align: center; margin-bottom: 3rem;
            animation: fadeIn 0.5s ease both;
        }
        .page-title {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 400; color: #1D1D1F;
            letter-spacing: -0.02em; line-height: 1.15;
            margin-bottom: 0.5rem;
        }
        .page-sub {
            font-size: 1rem; color: #86868B;
            max-width: 420px; margin: 0 auto 0.3rem;
            line-height: 1.6;
        }
        .page-sub-hi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 0.85rem; color: #AEAEB2;
            font-weight: 300;
        }

        /* ===================== COURSE GRID ===================== */
        .section-label {
            font-size: 0.7rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: #86868B; margin-bottom: 1rem;
            animation: fadeIn 0.5s ease 0.1s both;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
        }
        @media (max-width: 700px) {
            .course-grid { grid-template-columns: 1fr; }
        }

        .course-card {
            background: #FFFFFF;
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 12px;
            padding: 1.75rem;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }
        .course-card:hover {
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            transform: translateY(-2px);
        }
        .course-card.active-card {
            border-color: rgba(0,0,0,0.12);
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .course-card-accent {
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            border-radius: 12px 12px 0 0;
        }

        .course-card-head {
            display: flex; align-items: flex-start;
            justify-content: space-between; margin-bottom: 0.8rem;
        }
        .course-card-icon {
            width: 44px; height: 44px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
        }
        .course-card-meta {
            display: flex; align-items: center; gap: 0.4rem;
        }
        .course-card-days {
            font-size: 0.68rem; font-weight: 500; color: #86868B;
            background: #F5F5F0; padding: 0.25rem 0.6rem;
            border-radius: 100px;
        }
        .course-card-level {
            font-size: 0.62rem; font-weight: 600; color: #2D6A4F;
            text-transform: uppercase; letter-spacing: 0.05em;
            padding: 0.25rem 0.6rem; border-radius: 100px;
            background: #D8F3DC;
        }
        .course-card-level.intermediate { color: #92400E; background: #FEF3C7; }
        .course-card-level.all { color: #1B4332; background: #D8F3DC; }

        .course-card-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.25rem; color: #1D1D1F;
            line-height: 1.3; margin-bottom: 0.1rem;
        }
        .course-card-title-hi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 0.78rem; color: #AEAEB2;
            font-weight: 300; margin-bottom: 0.5rem;
        }
        .course-card-desc {
            font-size: 0.85rem; color: #86868B;
            line-height: 1.55; margin-bottom: 1rem;
        }

        .course-progress {
            display: flex; align-items: center; gap: 0.6rem;
            margin-bottom: 1rem;
        }
        .course-progress-bar {
            flex: 1; height: 4px;
            background: #F0F0EB; border-radius: 100px;
            overflow: hidden;
        }
        .course-progress-fill {
            height: 100%; border-radius: 100px;
            background: #2D6A4F;
            transition: width 0.5s ease;
        }
        .course-progress-text {
            font-size: 0.7rem; font-weight: 500; color: #AEAEB2;
            white-space: nowrap;
        }
        .course-progress-text.complete { color: #2D6A4F; }

        .course-card-btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.55rem 1.3rem; border-radius: 100px;
            font-size: 0.8rem; font-weight: 600;
            border: none; cursor: pointer;
            font-family: -apple-system, 'Inter', sans-serif;
            transition: all 0.22s ease;
            color: #fff; background: #2D6A4F;
        }
        .course-card-btn:hover { background: #1B4332; transform: translateY(-1px); }
        .course-card-btn svg { width: 14px; height: 14px; }

        /* ===================== COURSE DETAIL PANEL ===================== */
        .detail-panel {
            max-width: 960px;
            margin: 2rem auto 0;
            background: #FFFFFF;
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 16px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            max-height: 0;
            transition: opacity 0.45s ease, transform 0.45s ease, max-height 0.5s ease, margin 0.45s ease;
            pointer-events: none;
        }
        .detail-panel.show {
            opacity: 1;
            transform: translateY(0);
            max-height: 2000px;
            pointer-events: auto;
            margin-top: 2rem;
        }

        .detail-hero {
            padding: 2rem 2.5rem 1.8rem;
            position: relative;
            overflow: hidden;
        }
        .detail-hero::before {
            content: '';
            position: absolute; inset: 0;
            opacity: 0.07;
            background: radial-gradient(ellipse at 30% 50%, var(--accent-color) 0%, transparent 70%);
        }
        .detail-hero-inner {
            position: relative; z-index: 1;
            display: flex; align-items: flex-start; gap: 1.25rem;
        }
        .detail-hero-icon {
            width: 56px; height: 56px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; flex-shrink: 0;
        }
        .detail-hero-info { flex: 1; }
        .detail-hero-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.6rem; color: #1D1D1F;
            line-height: 1.25; margin-bottom: 0.15rem;
        }
        .detail-hero-title-hi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 0.82rem; color: #AEAEB2;
            font-weight: 300; margin-bottom: 0.6rem;
        }
        .detail-hero-meta {
            display: flex; align-items: center; gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .detail-hero-badge {
            font-size: 0.62rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.05em;
            padding: 0.25rem 0.7rem; border-radius: 100px;
        }
        .detail-hero-desc {
            font-size: 0.9rem; color: #86868B;
            line-height: 1.6; max-width: 480px;
        }
        .detail-close {
            position: absolute; top: 1.25rem; right: 1.25rem; z-index: 2;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0,0,0,0.06);
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #86868B;
            transition: all 0.2s ease;
        }
        .detail-close:hover { background: #F5F5F0; color: #1D1D1F; }
        .detail-close svg { width: 16px; height: 16px; }

        /* Timeline */
        .detail-timeline {
            padding: 0 2.5rem 2rem;
        }
        .detail-timeline-label {
            font-size: 0.68rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: #AEAEB2; margin-bottom: 1.25rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(0,0,0,0.04);
        }
        .timeline-list {
            position: relative;
            padding-left: 28px;
        }
        .timeline-list::before {
            content: '';
            position: absolute;
            left: 7px; top: 8px; bottom: 8px;
            width: 2px;
            background: #EEEEE9;
            border-radius: 2px;
        }
        .timeline-day {
            position: relative;
            padding: 0.65rem 0 0.65rem 1.25rem;
            display: flex; align-items: center; gap: 0.75rem;
            transition: opacity 0.3s ease;
        }
        .timeline-day.future { opacity: 0.45; }
        .timeline-day.current { opacity: 1; }

        .timeline-node {
            position: absolute;
            left: -28px; top: 50%; transform: translateY(-50%);
            width: 16px; height: 16px;
            border-radius: 50%;
            background: #FFFFFF;
            border: 2px solid #DDDDD8;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
            z-index: 1;
        }
        .timeline-day.done .timeline-node {
            background: #2D6A4F;
            border-color: #2D6A4F;
        }
        .timeline-day.done .timeline-node svg {
            display: block;
        }
        .timeline-day.current .timeline-node {
            border-color: var(--accent-color, #2D6A4F);
            box-shadow: 0 0 0 4px var(--accent-glow, rgba(45,106,79,0.12));
        }
        .timeline-node svg {
            width: 10px; height: 10px;
            display: none;
        }

        .timeline-day-num {
            font-size: 0.72rem; font-weight: 600;
            color: #AEAEB2; min-width: 42px;
        }
        .timeline-day.current .timeline-day-num { color: #1D1D1F; }
        .timeline-day.done .timeline-day-num { color: #2D6A4F; }

        .timeline-day-title {
            font-size: 0.88rem; font-weight: 500;
            color: #1D1D1F; flex: 1;
        }
        .timeline-day.future .timeline-day-title { color: #AEAEB2; }

        .timeline-type-badge {
            display: inline-flex; align-items: center; gap: 0.3rem;
            font-size: 0.62rem; font-weight: 500;
            padding: 0.2rem 0.55rem; border-radius: 100px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .timeline-type-badge svg {
            width: 11px; height: 11px;
        }
        .timeline-type-badge.type-guided {
            color: #2D6A4F; background: rgba(45,106,79,0.08);
        }
        .timeline-type-badge.type-breathing {
            color: #1E3A5F; background: rgba(30,58,95,0.08);
        }
        .timeline-type-badge.type-body-scan {
            color: #7C3AED; background: rgba(124,58,237,0.08);
        }
        .timeline-type-badge.type-journaling {
            color: #92400E; background: rgba(146,64,14,0.08);
        }
        .timeline-type-badge.type-visualization {
            color: #4338CA; background: rgba(67,56,202,0.08);
        }

        /* Begin button */
        .detail-actions {
            padding: 0 2.5rem 2.25rem;
        }
        .detail-begin-btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.82rem 2.2rem; border-radius: 100px;
            font-size: 0.9rem; font-weight: 600;
            border: none; cursor: pointer;
            font-family: -apple-system, 'Inter', sans-serif;
            transition: all 0.22s ease;
            color: #fff;
        }
        .detail-begin-btn:hover { transform: translateY(-1px); filter: brightness(0.9); }
        .detail-begin-btn svg { width: 16px; height: 16px; }

        /* ===================== ANIMATIONS ===================== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .stagger-1 { animation: fadeIn 0.4s ease 0.05s both; }
        .stagger-2 { animation: fadeIn 0.4s ease 0.1s both; }
        .stagger-3 { animation: fadeIn 0.4s ease 0.15s both; }
        .stagger-4 { animation: fadeIn 0.4s ease 0.2s both; }
        .stagger-5 { animation: fadeIn 0.4s ease 0.25s both; }
        .stagger-6 { animation: fadeIn 0.4s ease 0.3s both; }

        @media (max-width: 600px) {
            .detail-hero { padding: 1.5rem 1.25rem 1.25rem; }
            .detail-timeline { padding: 0 1.25rem 1.5rem; }
            .detail-actions { padding: 0 1.25rem 1.75rem; }
            .detail-hero-title { font-size: 1.35rem; }
            .detail-hero-icon { width: 48px; height: 48px; }
            .timeline-day-title { font-size: 0.82rem; }
        }
    </style>
</head>

        svg: '<svg viewBox="0 0 16 16" fill="none"><path d="M8 2C5 2 3 4.5 3 7c0 2 1.5 3.5 2.5 4.5L8 14l2.5-2.5C11.5 10.5 13 9 13 7c0-2.5-2-5-5-5z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M6.5 7.5a1.5 1.5 0 103 0 1.5 1.5 0 00-3 0" stroke="currentColor" stroke-width="1"/></svg>'
    },
    "body-scan": {
        label: "Body Scan",
        cls: "type-body-scan",
        svg: '<svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="3.5" r="1.8" stroke="currentColor" stroke-width="1.2"/><path d="M5.5 7h5M8 7v5M6 12h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>'
    },
    "journaling": {
        label: "Journaling",
        cls: "type-journaling",
        svg: '<svg viewBox="0 0 16 16" fill="none"><path d="M3 13V3.5A1.5 1.5 0 014.5 2H12v10H4.5A1.5 1.5 0 003 13z" stroke="currentColor" stroke-width="1.2"/><path d="M3 13a1.5 1.5 0 011.5-1.5H12" stroke="currentColor" stroke-width="1.2"/><path d="M6 5h4M6 7.5h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>'
    },
    "visualization": {
        label: "Visualization",
        cls: "type-visualization",
        svg: '<svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.2"/><circle cx="8" cy="8" r="1" fill="currentColor"/><path d="M1 8c2-4 5-6 7-6s5 2 7 6c-2 4-5 6-7 6S3 12 1 8z" stroke="currentColor" stroke-width="1.2"/></svg>'
    }
};

/* ===================== PROGRESS HELPERS ===================== */
function getCourseDay(id) { return parseInt(localStorage.getItem('sukoon-course-' + id + '-day') || '1', 10); }
function setCourseDay(id, d) { localStorage.setItem('sukoon-course-' + id + '-day', String(d)); }
function isDayDone(id, d) { return localStorage.getItem('sukoon-course-' + id + '-day-' + d + '-done') === 'true'; }
function getCompletedDays(id) { var count = 0; var c = COURSES[id]; for (var d = 1; d <= c.days; d++) { if (isDayDone(id, d)) count++; } return count; }
function isCourseComplete(id) { return getCompletedDays(id) >= COURSES[id].days; }

/* ===================== STATE ===================== */
var activeDetailId = null;

/* ===================== RENDER GRID ===================== */
function renderGrid() {
    var grid = document.getElementById('courseGrid');
    grid.innerHTML = '';
    var order = ['start-here','calm-anxiety','better-sleep','sharp-focus','healing-grief','self-love'];
    order.forEach(function(cid, idx) {
        var c = COURSES[cid];
        var day = getCourseDay(c.id);
        var done = getCompletedDays(c.id);
        var pct = Math.round((done / c.days) * 100);
        var complete = isCourseComplete(c.id);
        var levelClass = c.level === 'Intermediate' ? ' intermediate' : (c.level === 'All levels' ? ' all' : '');
        var btnLabel = complete ? 'Review' : (day === 1 && !isDayDone(c.id, 1) ? 'Start' : 'Continue');
        var btnIcon = '<svg viewBox="0 0 16 16" fill="none"><path d="M5.5 3l6 5-6 5V3z" fill="currentColor"/></svg>';

        var card = document.createElement('div');
        card.className = 'course-card stagger-' + (idx + 1);
        card.setAttribute('data-course', cid);
        if (activeDetailId === cid) card.classList.add('active-card');
        card.innerHTML =
            '<div class="course-card-accent" style="background:' + c.color + '"></div>' +
            '<div class="course-card-head">' +
                '<div class="course-card-icon" style="background:' + c.colorLight + '">' + c.icon + '</div>' +
                '<div class="course-card-meta">' +
                    '<span class="course-card-days">' + c.days + ' days</span>' +
                    '<span class="course-card-level' + levelClass + '">' + c.level + '</span>' +
                '</div>' +
            '</div>' +
            '<div class="course-card-title">' + c.title + '</div>' +
            '<div class="course-card-title-hi">' + c.titleHi + '</div>' +
            '<div class="course-card-desc">' + c.desc + '</div>' +
            '<div class="course-progress">' +
                '<div class="course-progress-bar"><div class="course-progress-fill" style="width:' + pct + '%;background:' + c.color + '"></div></div>' +
                '<span class="course-progress-text' + (complete ? ' complete' : '') + '">' + (complete ? 'Done' : done + '/' + c.days) + '</span>' +
            '</div>' +
            '<button class="course-card-btn" style="background:' + c.color + '">' + btnIcon + ' ' + btnLabel + '</button>';

        card.addEventListener('click', function(e) {
            e.preventDefault();
            showDetail(cid);
        });
        grid.appendChild(card);
    });
}

/* ===================== SHOW DETAIL ===================== */
function showDetail(courseId) {
    var panel = document.getElementById('detailPanel');
    var c = COURSES[courseId];
    var currentDay = getCourseDay(c.id);
    var complete = isCourseComplete(c.id);

    /* If clicking the same course again, close it */
    if (activeDetailId === courseId && panel.classList.contains('show')) {
        closeDetail();
        return;
    }

    activeDetailId = courseId;

    /* Update active card highlight */
    document.querySelectorAll('.course-card').forEach(function(card) {
        card.classList.remove('active-card');
        if (card.getAttribute('data-course') === courseId) card.classList.add('active-card');
    });

    /* Level badge styling */
    var levelColor, levelBg;
    if (c.level === 'Intermediate') { levelColor = '#92400E'; levelBg = '#FEF3C7'; }
    else if (c.level === 'All levels') { levelColor = '#1B4332'; levelBg = '#D8F3DC'; }
    else { levelColor = '#2D6A4F'; levelBg = '#D8F3DC'; }

    /* Build timeline */
    var timelineHtml = '';
    for (var d = 1; d <= c.days; d++) {
        var s = c.sessions[d];
        var dayDone = isDayDone(c.id, d);
        var isCurrent = (d === currentDay) && !complete;
        var isFuture = (d > currentDay) && !complete && !dayDone;
        var stateClass = dayDone ? 'done' : (isCurrent ? 'current' : (isFuture ? 'future' : ''));
        var typeInfo = SESSION_TYPES[s.type] || SESSION_TYPES['guided'];

        timelineHtml +=
            '<div class="timeline-day ' + stateClass + '">' +
                '<div class="timeline-node">' +
                    '<svg viewBox="0 0 12 12" fill="none"><path d="M2.5 6l2.5 2.5 5-5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
                '</div>' +
                '<span class="timeline-day-num">Day ' + d + '</span>' +
                '<span class="timeline-day-title">' + s.title + '</span>' +
                '<span class="timeline-type-badge ' + typeInfo.cls + '">' + typeInfo.svg + ' ' + typeInfo.label + '</span>' +
            '</div>';
    }

    /* Button label */
    var beginDay = complete ? 1 : currentDay;
    var beginLabel = complete ? 'Restart Course' : 'Begin Day ' + beginDay;

    panel.style.setProperty('--accent-color', c.color);
    panel.style.setProperty('--accent-glow', c.colorLight);

    panel.innerHTML =
        '<div class="detail-hero" style="--accent-color:' + c.color + '">' +
            '<button class="detail-close" onclick="window._closeDetail()">' +
                '<svg viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' +
            '</button>' +
            '<div class="detail-hero-inner">' +
                '<div class="detail-hero-icon" style="background:' + c.colorLight + ';font-size:1.5rem">' + c.icon + '</div>' +
                '<div class="detail-hero-info">' +
                    '<div class="detail-hero-title">' + c.title + '</div>' +
                    '<div class="detail-hero-title-hi">' + c.titleHi + '</div>' +
                    '<div class="detail-hero-meta">' +
                        '<span class="detail-hero-badge" style="color:' + levelColor + ';background:' + levelBg + '">' + c.level + '</span>' +
                        '<span class="detail-hero-badge" style="color:#86868B;background:#F5F5F0">' + c.days + ' days</span>' +
                    '</div>' +
                    '<div class="detail-hero-desc">' + c.desc + '</div>' +
                '</div>' +
            '</div>' +
        '</div>' +
        '<div class="detail-timeline">' +
            '<div class="detail-timeline-label">Day-by-Day Schedule</div>' +
            '<div class="timeline-list">' + timelineHtml + '</div>' +
        '</div>' +
        '<div class="detail-actions">' +
            '<button class="detail-begin-btn" style="background:' + c.color + '" onclick="window._beginDay(\'' + c.id + '\',' + beginDay + ')">' +
                '<svg viewBox="0 0 16 16" fill="none"><path d="M5.5 3l6 5-6 5V3z" fill="currentColor"/></svg> ' +
                beginLabel +
            '</button>' +
        '</div>';

    /* Animate in */
    if (!panel.classList.contains('show')) {
        panel.classList.add('show');
    }

    /* Scroll into view */
    setTimeout(function() {
        panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
}

/* ===================== CLOSE DETAIL ===================== */
function closeDetail() {
    var panel = document.getElementById('detailPanel');
    panel.classList.remove('show');
    activeDetailId = null;
    document.querySelectorAll('.course-card').forEach(function(card) {
        card.classList.remove('active-card');
    });
}

/* ===================== BEGIN DAY (navigate to player) ===================== */
function beginDay(courseId, day) {
    /* If course is complete and restarting, reset progress */
    if (isCourseComplete(courseId)) {
        var c = COURSES[courseId];
        setCourseDay(courseId, 1);
        for (var d = 1; d <= c.days; d++) localStorage.removeItem('sukoon-course-' + courseId + '-day-' + d + '-done');
        day = 1;
    }
    window.location.href = '/course-player.html?course=' + courseId + '&day=' + day;
}

/* Expose to inline onclick handlers */
window._closeDetail = closeDetail;
window._beginDay = beginDay;

/* ===================== INIT ===================== */
renderGrid();

})();
</script>
</body>
</html>
