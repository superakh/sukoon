<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meditate - Sukoon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+Devanagari:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #F1F5F9;
            background: #0F172A;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            padding-bottom: 80px;
        }
        a { text-decoration: none; color: inherit; }

        /* ===================== STAGGERED LOAD ANIMATIONS ===================== */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(124,58,237,0.3)); }
            50% { filter: drop-shadow(0 0 20px rgba(124,58,237,0.6)); }
        }
        @keyframes orbDrift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(25px, -15px) scale(1.06); }
            66% { transform: translate(-18px, 12px) scale(0.94); }
        }
        @keyframes ringPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .stagger-1 { animation: fadeSlideUp 0.7s ease both; animation-delay: 0.1s; }
        .stagger-2 { animation: fadeSlideUp 0.7s ease both; animation-delay: 0.2s; }
        .stagger-3 { animation: fadeSlideUp 0.7s ease both; animation-delay: 0.35s; }
        .stagger-4 { animation: fadeSlideUp 0.7s ease both; animation-delay: 0.5s; }
        .stagger-5 { animation: fadeSlideUp 0.7s ease both; animation-delay: 0.65s; }
        .stagger-6 { animation: fadeSlideUp 0.7s ease both; animation-delay: 0.8s; }

        /* ===================== TOPBAR (Frosted Glass) ===================== */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 1.5rem; height: 60px;
            background: rgba(15,23,42,0.6);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .topbar-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 1.35rem; color: #F1F5F9;
            display: flex; align-items: center; gap: 0.4rem;
            letter-spacing: -0.01em;
        }

        /* ===================== BOTTOM NAVIGATION (Mobile) ===================== */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: space-around;
            height: 72px;
            background: rgba(15,23,42,0.85);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 0 0.5rem;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .bottom-nav a {
            display: flex; flex-direction: column; align-items: center;
            gap: 0.25rem; padding: 0.5rem 0.75rem;
            font-size: 0.65rem; font-weight: 500; color: #64748B;
            transition: color 0.2s ease;
            text-decoration: none; position: relative;
            min-width: 56px;
        }
        .bottom-nav a svg { width: 22px; height: 22px; transition: all 0.2s ease; }
        .bottom-nav a:hover { color: #94A3B8; }
        .bottom-nav a.active { color: #7C3AED; }
        .bottom-nav a.active svg { filter: drop-shadow(0 0 6px rgba(124,58,237,0.4)); }

        /* ===================== DESKTOP SIDEBAR >900px ===================== */
        @media (min-width: 901px) {
            .bottom-nav {
                position: fixed; top: 60px; left: 0; bottom: 0;
                width: 240px; flex-direction: column;
                justify-content: flex-start; align-items: stretch;
                padding: 1.5rem 0.75rem; gap: 0.25rem;
                border-top: none; border-right: 1px solid rgba(255,255,255,0.06);
                height: auto;
            }
            .bottom-nav a {
                flex-direction: row; gap: 0.75rem;
                padding: 0.75rem 1rem; border-radius: 12px;
                font-size: 0.88rem; min-width: unset;
                justify-content: flex-start;
            }
            .bottom-nav a:hover { background: rgba(255,255,255,0.04); color: #F1F5F9; }
            .bottom-nav a.active {
                background: rgba(124,58,237,0.12); color: #7C3AED;
            }
            .meditate-page { margin-left: 240px; }
            body { padding-bottom: 0; }
        }

        /* ===================== FULL-PAGE MEDITATION ===================== */
        .meditate-page {
            min-height: 100vh; min-height: 100dvh;
            padding-top: 60px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        /* Dark gradient mesh */
        .mesh-bg {
            position: absolute; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 80% 55% at 20% 15%, rgba(124,58,237,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 65% 60% at 85% 25%, rgba(245,158,11,0.05) 0%, transparent 55%),
                radial-gradient(ellipse 70% 55% at 50% 85%, rgba(124,58,237,0.04) 0%, transparent 55%),
                radial-gradient(ellipse 55% 65% at 8% 75%, rgba(245,158,11,0.03) 0%, transparent 50%),
                linear-gradient(180deg, #0F172A 0%, #0B1120 100%);
        }
        .mesh-orb {
            position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.08;
            animation: orbDrift 28s ease-in-out infinite;
        }
        .mesh-orb:nth-child(1) { width: 420px; height: 420px; background: #7C3AED; top: 2%; left: 8%; }
        .mesh-orb:nth-child(2) { width: 360px; height: 360px; background: #F59E0B; bottom: 10%; right: 8%; animation-delay: 9s; }
        .mesh-orb:nth-child(3) { width: 300px; height: 300px; background: #7C3AED; top: 55%; left: 55%; animation-delay: 18s; }

        .med-content {
            position: relative; z-index: 2;
            display: flex; flex-direction: column;
            align-items: center; text-align: center;
            padding: 1.5rem 1.5rem 2.5rem;
            width: 100%; max-width: 580px;
        }

        /* ===================== STREAK BADGE ===================== */
        .streak-badge {
            display: inline-flex; align-items: center; gap: 0.45rem;
            background: rgba(30,41,59,0.7);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 100px; padding: 0.5rem 1.15rem;
            font-size: 0.8rem; font-weight: 600; color: #F59E0B;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
            margin-bottom: 1.75rem;
            letter-spacing: 0.01em;
        }
        .streak-badge svg { width: 16px; height: 16px; flex-shrink: 0; }
        .streak-num { font-variant-numeric: tabular-nums; color: #F59E0B; }
        .streak-label { color: #94A3B8; }

        /* ===================== DURATION PILLS ===================== */
        .dur-row {
            display: flex; gap: 0.45rem; flex-wrap: wrap;
            justify-content: center; margin-bottom: 2.25rem;
        }
        .dur-pill {
            padding: 0.55rem 1.15rem; border-radius: 100px;
            font-size: 0.82rem; font-weight: 500;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(30,41,59,0.5);
            color: #94A3B8; cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
            user-select: none;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .dur-pill:hover {
            border-color: rgba(124,58,237,0.35); color: #C4B5FD;
            background: rgba(124,58,237,0.08);
        }
        .dur-pill.active {
            background: linear-gradient(135deg, #7C3AED, #6D28D9);
            border-color: #7C3AED;
            color: #fff;
            box-shadow: 0 2px 16px rgba(124,58,237,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
        }

        /* ===================== SVG PROGRESS RING ===================== */
        .ring-wrap {
            position: relative;
            width: 280px; height: 280px;
            margin-bottom: 2rem;
        }
        .ring-svg {
            width: 100%; height: 100%;
            transform: rotate(-90deg);
            filter: drop-shadow(0 0 12px rgba(124,58,237,0.2));
        }
        .ring-track {
            fill: none; stroke: rgba(124,58,237,0.08); stroke-width: 3;
        }
        .ring-fill {
            fill: none; stroke: url(#ringGrad); stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
            filter: drop-shadow(0 0 6px rgba(124,58,237,0.5));
        }
        .ring-glow {
            fill: none; stroke: url(#ringGrad); stroke-width: 8;
            stroke-linecap: round; opacity: 0.15;
            transition: stroke-dashoffset 0.5s ease;
            filter: blur(4px);
        }
        .ring-inner {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .timer-time {
            font-size: clamp(3.5rem, 11vw, 6rem);
            font-weight: 200; color: #F1F5F9;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.04em; line-height: 1;
        }
        .timer-state {
            font-size: 0.72rem; color: #64748B;
            font-weight: 600; margin-top: 0.6rem;
            text-transform: uppercase; letter-spacing: 0.14em;
        }

        /* ===================== AMBIENT SOUND SELECTOR ===================== */
        .snd-row {
            display: flex; gap: 0.5rem; margin-bottom: 2rem;
            flex-wrap: wrap; justify-content: center;
        }
        .snd-card {
            padding: 0.65rem 1.1rem; border-radius: 16px;
            font-size: 0.8rem; font-weight: 500;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(30,41,59,0.5);
            color: #94A3B8; cursor: pointer;
            transition: all 0.25s ease;
            display: flex; align-items: center; gap: 0.45rem;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }
        .snd-card svg { width: 16px; height: 16px; opacity: 0.5; transition: all 0.25s; }
        .snd-card:hover {
            border-color: rgba(245,158,11,0.3); color: #FBBF24;
            background: rgba(245,158,11,0.06);
        }
        .snd-card:hover svg { opacity: 0.8; }
        .snd-card.active {
            background: rgba(245,158,11,0.1);
            border-color: rgba(245,158,11,0.4);
            color: #FBBF24;
            box-shadow: 0 0 20px rgba(245,158,11,0.15), 0 2px 8px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .snd-card.active svg { opacity: 1; filter: drop-shadow(0 0 4px rgba(245,158,11,0.5)); }

        /* ===================== CONTROLS ===================== */
        .ctrls { display: flex; gap: 0.65rem; margin-bottom: 2.5rem; align-items: center; }
        .btn-main {
            padding: 0.85rem 2.6rem; border-radius: 100px;
            background: linear-gradient(135deg, #7C3AED, #6D28D9);
            color: #fff;
            font-size: 0.92rem; font-weight: 600;
            border: none; cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 20px rgba(124,58,237,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .btn-main:hover {
            background: linear-gradient(135deg, #8B5CF6, #7C3AED);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(124,58,237,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .btn-main:active { transform: translateY(0); }
        .btn-ghost {
            padding: 0.72rem 1.5rem; border-radius: 100px;
            background: rgba(30,41,59,0.6); color: #94A3B8;
            font-size: 0.84rem; font-weight: 500;
            border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
            transition: all 0.22s ease;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .btn-ghost:hover {
            border-color: rgba(255,255,255,0.15);
            background: rgba(30,41,59,0.8); color: #F1F5F9;
        }

        /* ===================== BILINGUAL PROMPTS ===================== */
        .prompt-wrap {
            min-height: 88px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .pmt-en {
            font-family: 'DM Serif Display', serif;
            font-style: italic; font-size: 1.15rem;
            color: rgba(241,245,249,0.75); line-height: 1.6;
            max-width: 400px;
            opacity: 1; transition: opacity 0.7s ease;
        }
        .pmt-hi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 0.85rem; color: #64748B;
            font-weight: 300; margin-top: 0.4rem;
            opacity: 1; transition: opacity 0.7s ease;
        }
        .pmt-en.fade, .pmt-hi.fade { opacity: 0; }

        /* ===================== SESSION COMPLETE OVERLAY ===================== */
        .done-overlay {
            position: fixed; inset: 0; z-index: 5000;
            background: rgba(15,23,42,0.92);
            backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 2rem;
            opacity: 0; pointer-events: none;
            transition: opacity 0.55s ease;
        }
        .done-overlay.show { opacity: 1; pointer-events: auto; }
        .done-icon {
            width: 80px; height: 80px; margin-bottom: 1.8rem;
            position: relative;
        }
        .done-icon svg { width: 100%; height: 100%; }
        .done-title {
            font-family: 'DM Serif Display', serif;
            font-size: 2.8rem; color: #F1F5F9; margin-bottom: 0.4rem;
        }
        .done-sub {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 1rem; color: #64748B; font-weight: 300;
            margin-bottom: 2.5rem;
        }
        .done-stats {
            display: flex; gap: 2.5rem; margin-bottom: 2.5rem;
        }
        .done-stat {
            display: flex; flex-direction: column; align-items: center;
            background: rgba(30,41,59,0.5);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px; padding: 1.25rem 2rem;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .done-val {
            font-size: 2rem; font-weight: 200; color: #7C3AED;
            font-variant-numeric: tabular-nums;
        }
        .done-lbl {
            font-size: 0.7rem; color: #64748B; text-transform: uppercase;
            letter-spacing: 0.08em; font-weight: 600; margin-top: 0.3rem;
        }

        /* ===================== RESPONSIVE ===================== */
        @media (max-width: 500px) {
            .ring-wrap { width: 220px; height: 220px; }
            .dur-row { gap: 0.3rem; }
            .dur-pill { padding: 0.45rem 0.85rem; font-size: 0.78rem; }
            .done-stats { gap: 1rem; }
            .done-stat { padding: 1rem 1.4rem; }
            .done-title { font-size: 2.2rem; }
            .ctrls { flex-wrap: wrap; justify-content: center; }
            .snd-card { padding: 0.5rem 0.85rem; font-size: 0.76rem; }
            .pmt-en { font-size: 1.02rem; }
            .topbar { padding: 0 1rem; }
        }
    </style>
</head>

<!-- ===================== MAIN ===================== -->
<main class="meditate-page">
    <div class="mesh-bg">
        <div class="mesh-orb"></div>
        <div class="mesh-orb"></div>
        <div class="mesh-orb"></div>
    </div>

    <div class="med-content">

        <!-- Streak -->
        <div class="streak-badge stagger-1">
            <svg viewBox="0 0 16 16" fill="none"><path d="M8 1.5L9.8 5.8 14.5 6.5 11.2 9.7 12 14.5 8 12.2 4 14.5 4.8 9.7 1.5 6.5 6.2 5.8z" fill="#F59E0B"/></svg>
            <span class="streak-label" data-i18n="meditate.streak">Day</span> <span class="streak-num" id="streakNum">1</span>
        </div>

        <!-- Duration pills -->
        <div class="dur-row stagger-2" id="durRow">
            <button class="dur-pill active" data-min="5">5 min</button>
            <button class="dur-pill" data-min="10">10 min</button>
            <button class="dur-pill" data-min="15">15 min</button>
            <button class="dur-pill" data-min="20">20 min</button>
            <button class="dur-pill" data-min="30">30 min</button>
        </div>

        <!-- SVG circular progress ring with gradient + glow -->
        <div class="ring-wrap stagger-3">
            <svg class="ring-svg" viewBox="0 0 280 280">
                <defs>
                    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#7C3AED"/>
                        <stop offset="50%" stop-color="#A855F7"/>
                        <stop offset="100%" stop-color="#F59E0B"/>
                    </linearGradient>
                    <filter id="ringGlow">
                        <feGaussianBlur stdDeviation="3" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                <circle class="ring-track" cx="140" cy="140" r="130"/>
                <circle class="ring-glow" id="ringGlow" cx="140" cy="140" r="130"
                    stroke-dasharray="816.81" stroke-dashoffset="0"/>
                <circle class="ring-fill" id="ringFill" cx="140" cy="140" r="130"
                    stroke-dasharray="816.81" stroke-dashoffset="0" filter="url(#ringGlow)"/>
            </svg>
            <div class="ring-inner">
                <div class="timer-time" id="timerTime">5:00</div>
                <div class="timer-state" id="timerState" data-i18n="meditate.ready">Ready</div>
            </div>
        </div>

        <!-- Ambient sound selector -->
        <div class="snd-row stagger-4" id="sndRow">
            <button class="snd-card active" data-snd="silence">
                <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.3"/><line x1="5" y1="5" x2="11" y2="11" stroke="currentColor" stroke-width="1.3"/></svg>
                <span data-i18n="meditate.silence">Silence</span>
            </button>
            <button class="snd-card" data-snd="rain">
                <svg viewBox="0 0 16 16" fill="none"><path d="M4 7v5M8 5v7M12 6v6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                <span data-i18n="meditate.rain">Rain</span>
            </button>
            <button class="snd-card" data-snd="ocean">
                <svg viewBox="0 0 16 16" fill="none"><path d="M1 8c2.5-2.5 5 0 7.5-2.5S13.5 3 16 5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M1 11.5c2.5-2.5 5 0 7.5-2.5S13.5 6.5 16 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" opacity="0.4"/></svg>
                <span data-i18n="meditate.ocean">Ocean</span>
            </button>
        </div>

        <!-- Controls -->
        <div class="ctrls stagger-5">
            <button class="btn-main" id="btnStart" data-i18n="meditate.start">Start</button>
            <button class="btn-ghost" id="btnPause" style="display:none" data-i18n="meditate.pause">Pause</button>
            <button class="btn-ghost" id="btnReset" style="display:none" data-i18n="meditate.reset">Reset</button>
        </div>

        <!-- Bilingual prompt -->
        <div class="prompt-wrap stagger-6">
            <div class="pmt-en" id="pmtEn">Close your eyes and arrive in this moment.</div>
            <div class="pmt-hi" id="pmtHi">&#x0906;&#x0901;&#x0916;&#x0947;&#x0902; &#x092C;&#x0902;&#x0926; &#x0915;&#x0930;&#x0947;&#x0902; &#x0914;&#x0930; &#x0907;&#x0938; &#x092A;&#x0932; &#x092E;&#x0947;&#x0902; &#x0906;&#x090F;&#x0902;&#x0964;</div>
        </div>
    </div>
</main>

<!-- ===================== SESSION COMPLETE ===================== -->
<div class="done-overlay" id="doneOverlay">
    <div class="done-icon">
        <svg viewBox="0 0 80 80" fill="none">
            <circle cx="40" cy="40" r="38" fill="#7C3AED" opacity="0.06"/>
            <circle cx="40" cy="40" r="26" fill="#7C3AED" opacity="0.1"/>
            <circle cx="40" cy="40" r="14" fill="#7C3AED" opacity="0.15"/>
            <path d="M40 22c0 9.94-8.06 18-18 18 9.94 0 18 8.06 18 18 0-9.94 8.06-18 18-18-9.94 0-18-8.06-18-18z" fill="#7C3AED" opacity="0.55"/>
        </svg>
    </div>
    <div class="done-title" data-i18n="meditate.namaste">Namaste</div>
    <div class="done-sub">&#x0928;&#x092E;&#x0938;&#x094D;&#x0924;&#x0947; &mdash; &#x0906;&#x092A;&#x0915;&#x0940; &#x0938;&#x093E;&#x0927;&#x0928;&#x093E; &#x092A;&#x0942;&#x0930;&#x094D;&#x0923; &#x0939;&#x0941;&#x0908;</div>
    <div class="done-stats">
        <div class="done-stat">
            <div class="done-val" id="doneTime">5:00</div>
            <div class="done-lbl" data-i18n="meditate.duration">Duration</div>
        </div>
        <div class="done-stat">
            <div class="done-val" id="doneStreak">1</div>
            <div class="done-lbl" data-i18n="meditate.day_streak">Day Streak</div>
        </div>
    </div>
    <button class="btn-main" id="btnContinue" data-i18n="meditate.continue_btn">Continue</button>
</div>

<script>
(function(){
    'use strict';

    /* ====== State ====== */
    var duration = 5 * 60;
    var remaining = duration;
    var running = false;
    var paused = false;
    var ticker = null;
    var audioCtx = null;
    var ambientSrc = null;
    var ambientGain = null;
    var curSound = 'silence';
    var promptIdx = 0;
    var promptTick = null;

    /* ====== DOM refs ====== */
    var $time = document.getElementById('timerTime');
    var $state = document.getElementById('timerState');
    var $ring = document.getElementById('ringFill');
    var $ringGlow = document.getElementById('ringGlow');
    var $start = document.getElementById('btnStart');
    var $pause = document.getElementById('btnPause');
    var $reset = document.getElementById('btnReset');
    var $streak = document.getElementById('streakNum');
    var $pmtEn = document.getElementById('pmtEn');
    var $pmtHi = document.getElementById('pmtHi');
    var $overlay = document.getElementById('doneOverlay');
    var $doneTime = document.getElementById('doneTime');
    var $doneStreak = document.getElementById('doneStreak');
    var CIRC = 2 * Math.PI * 130;

    /* ====== 16 bilingual prompts ====== */
    var prompts = [
        {en:"Close your eyes and arrive in this moment.",hi:"\u0906\u0901\u0916\u0947\u0902 \u092C\u0902\u0926 \u0915\u0930\u0947\u0902 \u0914\u0930 \u0907\u0938 \u092A\u0932 \u092E\u0947\u0902 \u0906\u090F\u0902\u0964"},
        {en:"Breathe in calm, breathe out tension.",hi:"\u0936\u093E\u0902\u0924\u093F \u0938\u093E\u0901\u0938 \u0932\u0947\u0902, \u0924\u0928\u093E\u0935 \u091B\u094B\u0921\u093C\u0947\u0902\u0964"},
        {en:"You are exactly where you need to be.",hi:"\u0906\u092A \u0920\u0940\u0915 \u0935\u0939\u0940\u0902 \u0939\u0948\u0902 \u091C\u0939\u093E\u0901 \u0906\u092A\u0915\u094B \u0939\u094B\u0928\u093E \u091A\u093E\u0939\u093F\u090F\u0964"},
        {en:"Let each thought pass like a cloud in the sky.",hi:"\u0939\u0930 \u0935\u093F\u091A\u093E\u0930 \u0915\u094B \u092C\u093E\u0926\u0932 \u0915\u0940 \u0924\u0930\u0939 \u0917\u0941\u091C\u0930\u0928\u0947 \u0926\u0947\u0902\u0964"},
        {en:"Feel the stillness that lives within you.",hi:"\u0905\u092A\u0928\u0947 \u092D\u0940\u0924\u0930 \u0915\u0940 \u0936\u093E\u0902\u0924\u093F \u092E\u0939\u0938\u0942\u0938 \u0915\u0930\u0947\u0902\u0964"},
        {en:"Your breath is your anchor to the present.",hi:"\u0906\u092A\u0915\u0940 \u0938\u093E\u0901\u0938 \u0935\u0930\u094D\u0924\u092E\u093E\u0928 \u0938\u0947 \u091C\u094B\u0921\u093C\u0924\u0940 \u0939\u0948\u0964"},
        {en:"There is nowhere else you need to be right now.",hi:"\u0907\u0938 \u0938\u092E\u092F \u0915\u0939\u0940\u0902 \u0914\u0930 \u0939\u094B\u0928\u0947 \u0915\u0940 \u091C\u0930\u0942\u0930\u0924 \u0928\u0939\u0940\u0902\u0964"},
        {en:"Observe your breath without changing it.",hi:"\u092C\u093F\u0928\u093E \u092C\u0926\u0932\u0947 \u0905\u092A\u0928\u0940 \u0938\u093E\u0901\u0938 \u0915\u094B \u0926\u0947\u0916\u0947\u0902\u0964"},
        {en:"Soften your shoulders, relax your jaw.",hi:"\u0915\u0902\u0927\u094B\u0902 \u0914\u0930 \u091C\u092C\u0921\u093C\u0947 \u0915\u094B \u0922\u0940\u0932\u093E \u0915\u0930\u0947\u0902\u0964"},
        {en:"With every exhale, release a little more.",hi:"\u0939\u0930 \u0938\u093E\u0901\u0938 \u091B\u094B\u0921\u093C\u0924\u0947 \u0938\u092E\u092F \u0925\u094B\u0921\u093C\u093E \u0914\u0930 \u091B\u094B\u0921\u093C\u0947\u0902\u0964"},
        {en:"Peace is not a destination. It is already here.",hi:"\u0936\u093E\u0902\u0924\u093F \u0915\u094B\u0908 \u092E\u0902\u091C\u093F\u0932 \u0928\u0939\u0940\u0902\u0964 \u092F\u0939 \u092A\u0939\u0932\u0947 \u0938\u0947 \u092F\u0939\u093E\u0901 \u0939\u0948\u0964"},
        {en:"When the mind wanders, return gently.",hi:"\u091C\u092C \u092E\u0928 \u092D\u091F\u0915\u0947 \u0924\u094B \u0927\u0940\u0930\u0947 \u0938\u0947 \u0932\u094C\u091F\u0947\u0902\u0964"},
        {en:"Feel the earth beneath you, steady and sure.",hi:"\u0905\u092A\u0928\u0947 \u0928\u0940\u091A\u0947 \u0915\u0940 \u0927\u0930\u0924\u0940 \u0915\u094B \u092E\u0939\u0938\u0942\u0938 \u0915\u0930\u0947\u0902\u0964"},
        {en:"This moment is a gift you give yourself.",hi:"\u092F\u0939 \u092A\u0932 \u0906\u092A\u0915\u093E \u0905\u092A\u0928\u0947 \u0932\u093F\u090F \u0909\u092A\u0939\u093E\u0930 \u0939\u0948\u0964"},
        {en:"Silence is the language of the soul.",hi:"\u092E\u094C\u0928 \u0906\u0924\u094D\u092E\u093E \u0915\u0940 \u092D\u093E\u0937\u093E \u0939\u0948\u0964"},
        {en:"You are not your thoughts. You are the witness.",hi:"\u0906\u092A \u0935\u093F\u091A\u093E\u0930 \u0928\u0939\u0940\u0902, \u0906\u092A \u0938\u093E\u0915\u094D\u0937\u0940 \u0939\u0948\u0902\u0964"}
    ];

    /* ====== Streak logic ====== */
    function loadStreak(){
        var d = JSON.parse(localStorage.getItem('sukoon_med')||'{}');
        var today = new Date().toDateString();
        var yesterday = new Date(Date.now()-864e5).toDateString();
        if(d.lastDate===today) return d.streak||1;
        if(d.lastDate===yesterday) return d.streak||1;
        return 0;
    }
    function bumpStreak(){
        var d = JSON.parse(localStorage.getItem('sukoon_med')||'{}');
        var today = new Date().toDateString();
        var yesterday = new Date(Date.now()-864e5).toDateString();
        var s = d.streak||0;
        if(d.lastDate===today) return s;
        s = (d.lastDate===yesterday) ? s+1 : 1;
        localStorage.setItem('sukoon_med',JSON.stringify({streak:s,lastDate:today}));
        return s;
    }
    $streak.textContent = Math.max(loadStreak(),1);

    /* ====== Timer helpers ====== */
    function fmt(s){ return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
    function render(){
        $time.textContent = fmt(remaining);
        var frac = 1 - remaining/duration;
        var offset = (CIRC*(1-frac)).toFixed(2);
        $ring.setAttribute('stroke-dashoffset', offset);
        $ringGlow.setAttribute('stroke-dashoffset', offset);
    }
    render();

    /* ====== Duration pills ====== */
    document.getElementById('durRow').addEventListener('click',function(e){
        var p = e.target.closest('.dur-pill');
        if(!p||running) return;
        document.querySelectorAll('.dur-pill').forEach(function(b){b.classList.remove('active');});
        p.classList.add('active');
        duration = parseInt(p.dataset.min)*60;
        remaining = duration;
        render();
        $state.textContent = 'Ready';
    });

    /* ====== Web Audio init ====== */
    function initAC(){
        if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
        if(audioCtx.state==='suspended') audioCtx.resume();
    }

    /* 528Hz singing bowl bell */
    function bell(){
        initAC();
        var t = audioCtx.currentTime;
        [[528,0.3,3.5],[1056,0.1,2.6],[1584,0.04,1.8],[792,0.06,2.2]].forEach(function(h){
            var o = audioCtx.createOscillator();
            var g = audioCtx.createGain();
            o.type='sine'; o.frequency.setValueAtTime(h[0],t);
            g.gain.setValueAtTime(h[1],t);
            g.gain.exponentialRampToValueAtTime(0.0001,t+h[2]);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(t); o.stop(t+h[2]);
        });
    }

    /* Ambient sound - crossfade looping engine for seamless audio */
    var ambientBufferCache = {};
    var ambientChannel = null;
    var AMBIENT_CROSSFADE = 4;

    async function loadAmbientBuffer(type){
        if(ambientBufferCache[type]) return ambientBufferCache[type];
        var url = '/audio/' + type + '.wav';
        try {
            var resp = await fetch(url);
            var ab = await resp.arrayBuffer();
            var decoded = await audioCtx.decodeAudioData(ab);
            ambientBufferCache[type] = decoded;
            return decoded;
        } catch(e){ console.warn('Failed to load ambient:', type, e); return null; }
    }

    function startAmbientCrossfade(ch, buf, offset) {
        var src = audioCtx.createBufferSource();
        src.buffer = buf; src.loop = false;
        var fadeG = audioCtx.createGain();
        fadeG.gain.setValueAtTime(0, audioCtx.currentTime);
        src.connect(fadeG); fadeG.connect(ch.gain);
        var dur = buf.duration;
        var fadeT = Math.min(AMBIENT_CROSSFADE, dur * 0.4);
        var now = audioCtx.currentTime;
        src.start(now, offset || 0);
        fadeG.gain.linearRampToValueAtTime(1, now + fadeT);
        var fadeOutStart = now + (dur - (offset||0) - fadeT);
        if(fadeOutStart > now + fadeT){
            fadeG.gain.setValueAtTime(1, fadeOutStart);
            fadeG.gain.linearRampToValueAtTime(0, fadeOutStart + fadeT);
        }
        var nextDelay = (dur - (offset||0) - fadeT) * 1000;
        if(nextDelay < 500) nextDelay = 500;
        var timer = setTimeout(function(){
            if(ambientChannel && ambientChannel.active) startAmbientCrossfade(ch, buf, 0);
        }, nextDelay);
        src.onended = function(){ try{fadeG.disconnect();}catch(e){} };
        ch.sources.push({src:src, gain:fadeG, timer:timer});
        while(ch.sources.length > 3){
            var old = ch.sources.shift();
            clearTimeout(old.timer);
            try{old.src.stop();}catch(e){} try{old.gain.disconnect();}catch(e){}
        }
    }

    async function makeNoise(type){
        initAC(); killAmbient();
        if(type==='silence') return;
        var buf = await loadAmbientBuffer(type);
        if(!buf) return;
        ambientGain = audioCtx.createGain();
        ambientGain.gain.setValueAtTime(0, audioCtx.currentTime);
        ambientGain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 2);
        ambientGain.connect(audioCtx.destination);
        ambientChannel = { gain: ambientGain, sources: [], active: true };
        startAmbientCrossfade(ambientChannel, buf, 0);
        setTimeout(function(){
            if(ambientChannel && ambientChannel.active) startAmbientCrossfade(ambientChannel, buf, 0);
        }, (buf.duration / 2) * 1000);
    }
    function killAmbient(){
        if(ambientChannel){
            ambientChannel.active = false;
            try{
                ambientChannel.gain.gain.cancelScheduledValues(audioCtx.currentTime);
                ambientChannel.gain.gain.setValueAtTime(ambientChannel.gain.gain.value, audioCtx.currentTime);
                ambientChannel.gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                var ch = ambientChannel;
                setTimeout(function(){
                    ch.sources.forEach(function(s){
                        clearTimeout(s.timer);
                        try{s.src.stop();}catch(e){} try{s.gain.disconnect();}catch(e){}
                    });
                    try{ch.gain.disconnect();}catch(e){}
                }, 600);
            }catch(e){}
            ambientChannel = null; ambientGain = null; ambientSrc = null;
        }
    }

    /* Sound cards */
    document.getElementById('sndRow').addEventListener('click',function(e){
        var p = e.target.closest('.snd-card');
        if(!p) return;
        document.querySelectorAll('.snd-card').forEach(function(b){b.classList.remove('active');});
        p.classList.add('active');
        curSound = p.dataset.snd;
        if(running && !paused) makeNoise(curSound);
    });

    /* ====== Prompt rotation ====== */
    function showPrompt(i){
        $pmtEn.classList.add('fade');
        $pmtHi.classList.add('fade');
        setTimeout(function(){
            var p = prompts[i%prompts.length];
            $pmtEn.textContent = p.en;
            $pmtHi.textContent = p.hi;
            $pmtEn.classList.remove('fade');
            $pmtHi.classList.remove('fade');
        },700);
    }
    function startPrompts(){
        promptIdx = Math.floor(Math.random()*prompts.length);
        showPrompt(promptIdx);
        promptTick = setInterval(function(){
            promptIdx++;
            showPrompt(promptIdx);
        },30000);
    }
    function stopPrompts(){ if(promptTick){clearInterval(promptTick);promptTick=null;} }

    /* ====== Timer controls ====== */
    function go(){
        initAC();
        running=true; paused=false;
        $state.textContent='Meditating';
        $start.style.display='none';
        $pause.style.display=''; $reset.style.display='';
        $pause.textContent='Pause';
        bell();
        makeNoise(curSound);
        startPrompts();
        ticker = setInterval(function(){
            remaining--;
            render();
            if(remaining<=0){
                clearInterval(ticker); ticker=null;
                running=false;
                bell();
                killAmbient();
                stopPrompts();
                complete();
            }
        },1000);
    }
    function togglePause(){
        if(!paused){
            paused=true; clearInterval(ticker); ticker=null;
            $state.textContent='Paused';
            $pause.textContent='Resume';
            killAmbient(); stopPrompts();
        } else {
            paused=false;
            $state.textContent='Meditating';
            $pause.textContent='Pause';
            makeNoise(curSound); startPrompts();
            ticker = setInterval(function(){
                remaining--;
                render();
                if(remaining<=0){
                    clearInterval(ticker); ticker=null;
                    running=false;
                    bell(); killAmbient(); stopPrompts();
                    complete();
                }
            },1000);
        }
    }
    function reset(){
        running=false; paused=false;
        if(ticker){clearInterval(ticker);ticker=null;}
        remaining=duration; render();
        $state.textContent='Ready';
        $start.style.display='';
        $pause.style.display='none'; $reset.style.display='none';
        $pause.textContent='Pause';
        killAmbient(); stopPrompts();
    }
    function complete(){
        var s = bumpStreak();
        $doneTime.textContent = fmt(duration);
        $doneStreak.textContent = s;
        $streak.textContent = s;
        requestAnimationFrame(function(){
            $overlay.classList.add('show');
        });
        $start.style.display='';
        $pause.style.display='none'; $reset.style.display='none';
        remaining=duration; render();
        $state.textContent='Complete';
    }

    $start.addEventListener('click', go);
    $pause.addEventListener('click', togglePause);
    $reset.addEventListener('click', reset);
    document.getElementById('btnContinue').addEventListener('click',function(){
        $overlay.classList.remove('show');
        $state.textContent='Ready';
    });
})();
</script>
<script src="/js/i18n.js"></script>
