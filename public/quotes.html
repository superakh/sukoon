<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes - Sukoon</title>
    <meta name="description" content="Bilingual quotes for the soul. Wisdom, kindness, courage, strength, and healing -- in English and Hindi.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, 'Inter', BlinkMacSystemFont, sans-serif;
            color: #1D1D1F;
            background: #FAFAF7;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        a { text-decoration: none; color: inherit; }

        /* ===================== TOPBAR ===================== */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            padding: 0 1.5rem; height: 52px;
            background: rgba(250,250,247,0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }
        .topbar-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 1.25rem; color: #1D1D1F;
            letter-spacing: -0.01em;
        }

        /* ===================== DESKTOP >960px ===================== */
        @media (min-width: 961px) {
            .topbar { justify-content: flex-start; padding-left: 2rem; left: 220px; }
            .quotes-page { margin-left: 220px; }
        }

        /* ===================== QUOTES PAGE ===================== */
        .quotes-page {
            min-height: 100vh;
            padding-top: 52px;
            padding-bottom: 80px;
        }

        /* ===================== DAILY QUOTE ===================== */
        .daily-section {
            padding: 2rem 1.5rem 1.5rem;
            max-width: 760px; margin: 0 auto;
        }
        .daily-card {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 2.25rem 2rem 1.75rem;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.06);
            border-left: 3px solid #2D6A4F;
        }
        .daily-inner { position: relative; z-index: 1; }
        .daily-label {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em;
            text-transform: uppercase; color: #2D6A4F;
            margin-bottom: 1.25rem;
        }
        .daily-label svg { width: 14px; height: 14px; }
        .daily-mark {
            font-family: 'DM Serif Display', serif;
            font-size: 3.5rem; color: rgba(45,106,79,0.15);
            line-height: 1; margin-bottom: 0.2rem;
        }
        .daily-en {
            font-family: 'DM Serif Display', serif;
            font-style: italic;
            font-size: 1.3rem; color: #1D1D1F;
            line-height: 1.5; margin-bottom: 0.85rem;
            max-width: 540px; margin-left: auto; margin-right: auto;
        }
        .daily-hi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 0.85rem; color: #AEAEB2;
            margin-bottom: 0.6rem; line-height: 1.6;
        }
        .daily-author {
            font-size: 0.8rem; color: #86868B; font-weight: 500;
            margin-bottom: 1.25rem;
        }
        .daily-actions {
            display: flex; align-items: center; justify-content: center; gap: 0.6rem;
        }
        .daily-btn {
            display: inline-flex; align-items: center; gap: 0.35rem;
            padding: 0.5rem 1rem; border-radius: 100px;
            font-size: 0.78rem; font-weight: 500;
            border: none; cursor: pointer; transition: all 0.25s;
            font-family: -apple-system, 'Inter', sans-serif;
        }
        .daily-btn svg { width: 14px; height: 14px; }
        .daily-btn.primary {
            background: #F5F5F0; color: #1D1D1F;
            border: 1px solid rgba(0,0,0,0.06);
        }
        .daily-btn.primary:hover { background: #EEEEE9; }

        /* ===================== SEARCH BAR ===================== */
        .search-section {
            max-width: 760px; margin: 0 auto;
            padding: 0 1.5rem 1rem;
        }
        .search-wrap { position: relative; }
        .search-wrap svg {
            position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
            width: 18px; height: 18px; color: #AEAEB2; pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 0.7rem 1rem 0.7rem 2.75rem;
            border-radius: 10px;
            border: 1px solid rgba(0,0,0,0.08);
            background: #FFFFFF;
            color: #1D1D1F;
            font-size: 0.88rem;
            font-family: -apple-system, 'Inter', sans-serif;
            outline: none; transition: all 0.25s;
        }
        .search-input::placeholder { color: #AEAEB2; }
        .search-input:focus {
            border-color: #2D6A4F;
            box-shadow: 0 0 0 3px rgba(45,106,79,0.08);
        }

        /* ===================== FILTER PILLS ===================== */
        .filter-section {
            max-width: 1100px; margin: 0 auto;
            padding: 0 1.5rem 1.25rem;
        }
        .filter-scroll {
            display: flex; gap: 0.35rem;
            overflow-x: auto; scrollbar-width: none;
            -ms-overflow-style: none; padding-bottom: 4px;
        }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .filter-pill {
            padding: 0.4rem 0.9rem; border-radius: 100px;
            background: #F5F5F0;
            border: 1px solid rgba(0,0,0,0.04);
            font-size: 0.78rem; font-weight: 500;
            color: #86868B; cursor: pointer;
            transition: all 0.25s;
            white-space: nowrap; flex-shrink: 0;
            font-family: -apple-system, 'Inter', sans-serif;
        }
        .filter-pill:hover { color: #1D1D1F; background: #EEEEE9; }
        .filter-pill.active {
            background: #2D6A4F; color: #fff;
            border-color: #2D6A4F;
        }

        /* ===================== QUOTES GRID ===================== */
        .quotes-section {
            max-width: 1100px; margin: 0 auto;
            padding: 0 1.5rem 2rem;
        }
        .quotes-grid {
            display: grid; grid-template-columns: 1fr; gap: 1rem;
        }
        @media (min-width: 640px) {
            .quotes-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 1024px) {
            .quotes-grid { grid-template-columns: repeat(3, 1fr); }
        }

        /* ===================== QUOTE CARD ===================== */
        .quote-card {
            background: #FFFFFF;
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 12px;
            padding: 1.5rem 1.35rem 1.15rem;
            transition: box-shadow 0.3s ease;
            position: relative;
            opacity: 0;
            animation: cardFadeIn 0.4s ease forwards;
        }
        .quote-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .quote-card.hidden { display: none; }

        @keyframes cardFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .quote-mark {
            font-family: 'DM Serif Display', serif;
            font-size: 2.2rem; line-height: 1;
            color: rgba(45,106,79,0.2);
            margin-bottom: 0.2rem;
        }
        .quote-en {
            font-family: 'DM Serif Display', serif;
            font-size: 1.02rem; color: #1D1D1F;
            line-height: 1.55; margin-bottom: 0.75rem;
        }
        .quote-hi-wrap {
            border-left: 2px solid rgba(45,106,79,0.2);
            padding-left: 0.85rem;
            margin-bottom: 0.75rem;
        }
        .quote-hi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 0.82rem; color: #AEAEB2;
            line-height: 1.65;
        }
        .quote-author {
            font-size: 0.78rem; color: #86868B;
            font-weight: 500; margin-bottom: 0.65rem;
            display: flex; align-items: center; gap: 0.35rem;
        }
        .quote-author::before {
            content: ''; width: 12px; height: 1px; background: #AEAEB2;
        }
        .quote-footer {
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.5rem;
        }
        .quote-tags {
            display: flex; flex-wrap: wrap; gap: 0.25rem;
        }
        .quote-tag {
            padding: 0.15rem 0.5rem; border-radius: 5px;
            font-size: 0.62rem; font-weight: 500;
            background: #D8F3DC; color: #2D6A4F;
        }
        .quote-actions {
            display: flex; gap: 0.3rem; flex-shrink: 0;
        }
        .action-btn {
            display: flex; align-items: center; justify-content: center;
            gap: 0.3rem;
            padding: 0.35rem 0.6rem; border-radius: 8px;
            background: #F5F5F0;
            border: 1px solid rgba(0,0,0,0.04);
            font-size: 0.7rem; font-weight: 500;
            color: #86868B;
            cursor: pointer; transition: all 0.2s;
            white-space: nowrap;
            font-family: -apple-system, 'Inter', sans-serif;
        }
        .action-btn:hover { background: #EEEEE9; color: #1D1D1F; }
        .action-btn.copied { background: #D8F3DC; color: #2D6A4F; }
        .action-btn svg { width: 13px; height: 13px; }

        /* ===================== NO RESULTS ===================== */
        .no-results {
            text-align: center; padding: 4rem 1rem;
            grid-column: 1 / -1; display: none;
        }
        .no-results.show { display: block; }
        .no-results-text { font-size: 0.95rem; color: #AEAEB2; margin-bottom: 0.25rem; }
        .no-results-hint {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 0.82rem; color: #AEAEB2;
        }

        /* ===================== QUOTE COUNT ===================== */
        .quote-count {
            text-align: center;
            padding: 0.5rem 1.5rem 1rem;
            font-size: 0.73rem; color: #AEAEB2;
        }
    </style>
</head>

    <script>
    (function() {
        'use strict';
        var quotes = [
            { en: "Be kind. Everyone is healing from things they don't speak about.", hi: "\u0926\u092F\u093E\u0932\u0941 \u092C\u0928\u094B\u0964 \u0939\u0930 \u0915\u094B\u0908 \u0909\u0928 \u091C\u093C\u0916\u094D\u092E\u094B\u0902 \u0938\u0947 \u0909\u092D\u0930 \u0930\u0939\u093E \u0939\u0948 \u091C\u093F\u0928\u0915\u0947 \u092C\u093E\u0930\u0947 \u092E\u0947\u0902 \u0935\u094B \u092C\u094B\u0932\u0924\u0947 \u0928\u0939\u0940\u0902\u0964", author: "", cats: ["kindness", "healing"] },
            { en: "Never blame anyone in your life. Good people give you happiness. Bad people give you experience. Worst people give you a lesson. Best people give you memories.", hi: "\u0905\u092A\u0928\u0940 \u091C\u093C\u093F\u0902\u0926\u0917\u0940 \u092E\u0947\u0902 \u0915\u093F\u0938\u0940 \u0915\u094B \u0926\u094B\u0937 \u0928 \u0926\u094B\u0964 \u0905\u091A\u094D\u091B\u0947 \u0932\u094B\u0917 \u0916\u0941\u0936\u0940 \u0926\u0947\u0924\u0947 \u0939\u0948\u0902\u0964 \u092C\u0941\u0930\u0947 \u0932\u094B\u0917 \u0905\u0928\u0941\u092D\u0935\u0964 \u0938\u092C\u0938\u0947 \u092C\u0941\u0930\u0947 \u0938\u092C\u0915\u0964 \u0938\u092C\u0938\u0947 \u0905\u091A\u094D\u091B\u0947 \u092F\u093E\u0926\u0947\u0902\u0964", author: "APJ Abdul Kalam", cats: ["wisdom", "strength"] },
            { en: "The light you discover is proportionate to the darkness you confront.", hi: "\u091C\u093F\u0924\u0928\u0947 \u0905\u0902\u0927\u0947\u0930\u0947 \u0915\u093E \u0938\u093E\u092E\u0928\u093E \u0915\u0930\u094B\u0917\u0947, \u0909\u0924\u0928\u093E \u0939\u0940 \u0930\u094B\u0936\u0928\u0940 \u092A\u093E\u0913\u0917\u0947\u0964", author: "Jordan Peterson", cats: ["courage", "strength"] },
            { en: "If you cannot call wrong as wrong, you are in the final stage of slavery.", hi: "\u0905\u0917\u0930 \u0906\u092A \u0917\u093C\u0932\u0924 \u0915\u094B \u0917\u093C\u0932\u0924 \u0928\u0939\u0940\u0902 \u0915\u0939 \u0938\u0915\u0924\u0947, \u0924\u094B \u0906\u092A \u0917\u093C\u0941\u0932\u093E\u092E\u0940 \u0915\u0940 \u0906\u0916\u093C\u093F\u0930\u0940 \u0938\u094D\u091F\u0947\u091C \u092E\u0947\u0902 \u0939\u0948\u0902\u0964", author: "Che Guevara", cats: ["courage", "strength"] },
            { en: "Desire makes slaves out of kings, patience makes kings out of slaves.", hi: "\u0907\u091A\u094D\u091B\u093E \u0930\u093E\u091C\u093E\u0913\u0902 \u0915\u094B \u0917\u093C\u0941\u0932\u093E\u092E \u092C\u0928\u093E\u0924\u0940 \u0939\u0948, \u0938\u092C\u094D\u0930 \u0917\u093C\u0941\u0932\u093E\u092E\u094B\u0902 \u0915\u094B \u0930\u093E\u091C\u093E\u0964", author: "Al-Ghazali", cats: ["islamic", "wisdom"] },
            { en: "Sadness is caused by intelligence. The more you understand, the more you suffer.", hi: "\u0926\u0941\u0916 \u092C\u0941\u0926\u094D\u0927\u093F \u0938\u0947 \u0906\u0924\u093E \u0939\u0948\u0964 \u091C\u093F\u0924\u0928\u093E \u0938\u092E\u091D\u094B\u0917\u0947, \u0909\u0924\u0928\u093E \u0926\u0941\u0916 \u092A\u093E\u0913\u0917\u0947\u0964", author: "Charles Bukowski", cats: ["wisdom", "self-talk"] },
            { en: "If you kill a cockroach you are a hero. Kill a butterfly and you are bad. Morals have an aesthetic basis.", hi: "\u090F\u0915 \u0915\u0949\u0915\u0930\u094B\u091A \u092E\u093E\u0930\u094B \u0924\u094B \u0939\u0940\u0930\u094B\u0964 \u0924\u093F\u0924\u0932\u0940 \u092E\u093E\u0930\u094B \u0924\u094B \u0916\u0932\u0928\u093E\u092F\u0915\u0964 \u0928\u0948\u0924\u093F\u0915\u0924\u093E \u0915\u093E \u0906\u0927\u093E\u0930 \u0938\u094C\u0902\u0926\u0930\u094D\u092F \u0939\u0948\u0964", author: "Friedrich Nietzsche", cats: ["wisdom", "humor"] },
            { en: "Life is like a kulfi -- taste it or waste it, it's melting anyway.", hi: "\u091C\u093C\u093F\u0902\u0926\u0917\u0940 \u0915\u0941\u0932\u094D\u092B\u093C\u0940 \u091C\u0948\u0938\u0940 \u0939\u0948 -- \u091A\u0916\u094B \u092F\u093E \u092C\u0930\u094D\u092C\u093E\u0926 \u0915\u0930\u094B, \u092A\u093F\u0918\u0932 \u0924\u094B \u0930\u0939\u0940 \u0939\u0940 \u0939\u0948\u0964", author: "", cats: ["humor", "wisdom"] },
            { en: "The wound is the place where the light enters you.", hi: "\u0918\u093E\u0935 \u0935\u0939 \u091C\u0917\u0939 \u0939\u0948 \u091C\u0939\u093E\u0901 \u0938\u0947 \u0930\u094B\u0936\u0928\u0940 \u0906\u092A\u0915\u0947 \u0905\u0902\u0926\u0930 \u0906\u0924\u0940 \u0939\u0948\u0964", author: "Rumi", cats: ["healing", "wisdom", "islamic"] },
            { en: "Forgive your parents. They too had a childhood they didn't heal from.", hi: "\u0905\u092A\u0928\u0947 \u092E\u093E\u0924\u093E-\u092A\u093F\u0924\u093E \u0915\u094B \u092E\u093E\u092B\u093C \u0915\u0930\u094B\u0964 \u0909\u0928\u0915\u093E \u092D\u0940 \u090F\u0915 \u092C\u091A\u092A\u0928 \u0925\u093E \u091C\u093F\u0938\u0938\u0947 \u0935\u094B \u0909\u092D\u0930 \u0928\u0939\u0940\u0902 \u092A\u093E\u090F\u0964", author: "", cats: ["family", "healing"] },
            { en: "Your calm mind is the ultimate weapon against your challenges.", hi: "\u0906\u092A\u0915\u093E \u0936\u093E\u0902\u0924 \u092E\u0928 \u0906\u092A\u0915\u0940 \u091A\u0941\u0928\u094C\u0924\u093F\u092F\u094B\u0902 \u0915\u0947 \u0916\u093F\u0932\u093E\u092B\u093C \u0938\u092C\u0938\u0947 \u0936\u0915\u094D\u0924\u093F\u0936\u093E\u0932\u0940 \u0939\u0925\u093F\u092F\u093E\u0930 \u0939\u0948\u0964", author: "Bryant McGill", cats: ["peace", "strength"] },
            { en: "Do not lose hope, nor be sad. You will surely be tested, but Allah is with the patient.", hi: "\u0909\u092E\u094D\u092E\u0940\u0926 \u092E\u0924 \u0916\u094B\u0913 \u0914\u0930 \u0928 \u0909\u0926\u093E\u0938 \u0939\u094B\u0964 \u0924\u0941\u092E\u094D\u0939\u093E\u0930\u0940 \u092A\u0930\u0940\u0915\u094D\u0937\u093E \u0939\u094B\u0917\u0940, \u092A\u0930 \u0905\u0932\u094D\u0932\u093E\u0939 \u0938\u092C\u094D\u0930 \u0915\u0930\u0928\u0947 \u0935\u093E\u0932\u094B\u0902 \u0915\u0947 \u0938\u093E\u0925 \u0939\u0948\u0964", author: "Quran 2:153", cats: ["islamic", "strength", "peace"] },
            { en: "Holding on to anger is like drinking poison and expecting the other person to die.", hi: "\u0917\u0941\u0938\u094D\u0938\u093E \u092A\u0915\u0921\u093C\u0928\u093E \u091C\u093C\u0939\u0930 \u092A\u0940\u0928\u0947 \u091C\u0948\u0938\u093E \u0939\u0948 \u0914\u0930 \u0909\u092E\u094D\u092E\u0940\u0926 \u0915\u0930\u0928\u093E \u0915\u093F \u0926\u0942\u0938\u0930\u093E \u092E\u0930\u0947\u0917\u093E\u0964", author: "Buddha", cats: ["wisdom", "peace", "healing"] },
            { en: "The strongest people are not those who show strength in front of us, but those who win battles we know nothing about.", hi: "\u0938\u092C\u0938\u0947 \u092E\u091C\u093C\u092C\u0942\u0924 \u0935\u094B \u0928\u0939\u0940\u0902 \u091C\u094B \u0939\u092E\u093E\u0930\u0947 \u0938\u093E\u092E\u0928\u0947 \u0924\u093E\u0915\u0924 \u0926\u093F\u0916\u093E\u0924\u0947 \u0939\u0948\u0902, \u092C\u0932\u094D\u0915\u093F \u0935\u094B \u091C\u094B \u0909\u0928 \u0932\u0921\u093C\u093E\u0907\u092F\u094B\u0902 \u092E\u0947\u0902 \u091C\u0940\u0924\u0924\u0947 \u0939\u0948\u0902 \u091C\u093F\u0928\u0915\u0947 \u092C\u093E\u0930\u0947 \u0939\u092E \u0915\u0941\u091B \u0928\u0939\u0940\u0902 \u091C\u093E\u0928\u0924\u0947\u0964", author: "", cats: ["strength", "courage"] },
            { en: "Sometimes the bravest thing you can do is ask for help.", hi: "\u0915\u092D\u0940-\u0915\u092D\u0940 \u0938\u092C\u0938\u0947 \u092C\u0939\u093E\u0926\u0941\u0930 \u0915\u093E\u092E \u092E\u0926\u0926 \u092E\u093E\u0901\u0917\u0928\u093E \u0939\u094B\u0924\u093E \u0939\u0948\u0964", author: "", cats: ["courage", "self-talk"] },
            { en: "You are allowed to be both a masterpiece and a work in progress simultaneously.", hi: "\u0906\u092A \u090F\u0915 \u0938\u093E\u0925 \u0936\u093E\u0939\u0915\u093E\u0930 \u092D\u0940 \u0939\u094B \u0938\u0915\u0924\u0947 \u0939\u0948\u0902 \u0914\u0930 \u0905\u0927\u0942\u0930\u0940 \u092D\u0940\u0964", author: "Sophia Bush", cats: ["self-talk", "healing"] },
            { en: "Your children don't need a perfect parent. They need a happy one.", hi: "\u0906\u092A\u0915\u0947 \u092C\u091A\u094D\u091A\u094B\u0902 \u0915\u094B \u092A\u0930\u092B\u0947\u0915\u094D\u091F \u092E\u093E\u0924\u093E-\u092A\u093F\u0924\u093E \u0928\u0939\u0940\u0902, \u0916\u0941\u0936 \u092E\u093E\u0924\u093E-\u092A\u093F\u0924\u093E \u091A\u093E\u0939\u093F\u090F\u0964", author: "", cats: ["family", "kindness"] },
            { en: "Talk to yourself like you would to someone you love.", hi: "\u0905\u092A\u0928\u0947 \u0906\u092A \u0938\u0947 \u0910\u0938\u0947 \u092C\u093E\u0924 \u0915\u0930\u094B \u091C\u0948\u0938\u0947 \u0915\u093F\u0938\u0940 \u092A\u094D\u092F\u093E\u0930\u0947 \u0938\u0947 \u0915\u0930\u0924\u0947 \u0939\u094B\u0964", author: "Brene Brown", cats: ["self-talk", "kindness"] },
            { en: "And verily, with hardship comes ease.", hi: "\u0914\u0930 \u092C\u0947\u0936\u0915, \u092E\u0941\u0936\u094D\u0915\u093F\u0932 \u0915\u0947 \u0938\u093E\u0925 \u0906\u0938\u093E\u0928\u0940 \u0939\u0948\u0964", author: "Quran 94:6", cats: ["islamic", "strength", "peace"] },
            { en: "The only person you should try to be better than is the person you were yesterday.", hi: "\u0906\u092A\u0915\u094B \u0938\u093F\u0930\u094D\u092B\u093C \u0915\u0932 \u0915\u0947 \u0905\u092A\u0928\u0947 \u0906\u092A \u0938\u0947 \u092C\u0947\u0939\u0924\u0930 \u092C\u0928\u0928\u093E \u0939\u0948\u0964", author: "", cats: ["self-talk", "strength"] },
            { en: "Home is not a place. It is the people who love you when you have nothing to offer.", hi: "\u0918\u0930 \u0915\u094B\u0908 \u091C\u0917\u0939 \u0928\u0939\u0940\u0902\u0964 \u0918\u0930 \u0935\u094B \u0932\u094B\u0917 \u0939\u0948\u0902 \u091C\u094B \u0906\u092A\u0938\u0947 \u0924\u092C \u092D\u0940 \u092A\u094D\u092F\u093E\u0930 \u0915\u0930\u0924\u0947 \u0939\u0948\u0902 \u091C\u092C \u0906\u092A\u0915\u0947 \u092A\u093E\u0938 \u0926\u0947\u0928\u0947 \u0915\u094B \u0915\u0941\u091B \u0928 \u0939\u094B\u0964", author: "", cats: ["family", "kindness"] },
            { en: "Worrying does not take away tomorrow's troubles. It takes away today's peace.", hi: "\u091A\u093F\u0902\u0924\u093E \u0915\u0932 \u0915\u0940 \u092E\u0941\u0938\u0940\u092C\u0924 \u0928\u0939\u0940\u0902 \u0939\u091F\u093E\u0924\u0940\u0964 \u092F\u0939 \u0906\u091C \u0915\u0940 \u0936\u093E\u0902\u0924\u093F \u091B\u0940\u0928 \u0932\u0947\u0924\u0940 \u0939\u0948\u0964", author: "", cats: ["peace", "wisdom"] },
            { en: "You don't have to defend your boundaries. You just have to set them.", hi: "\u0906\u092A\u0915\u094B \u0905\u092A\u0928\u0940 \u0938\u0940\u092E\u093E\u0913\u0902 \u0915\u0940 \u0930\u0915\u094D\u0937\u093E \u0928\u0939\u0940\u0902 \u0915\u0930\u0928\u0940\u0964 \u092C\u0938 \u0909\u0928\u094D\u0939\u0947\u0902 \u0924\u092F \u0915\u0930\u0928\u093E \u0939\u0948\u0964", author: "", cats: ["self-talk", "strength"] },
            { en: "Not everything that weighs you down is yours to carry.", hi: "\u0939\u0930 \u092C\u094B\u091D \u091C\u094B \u0906\u092A\u0915\u094B \u0926\u092C\u093E\u0924\u0940 \u0939\u0948, \u0935\u094B \u0906\u092A\u0915\u0940 \u0928\u0939\u0940\u0902 \u0939\u0948\u0964", author: "", cats: ["peace", "healing"] },
            { en: "Patience with family is love. Patience with others is respect. Patience with self is confidence.", hi: "\u092A\u0930\u093F\u0935\u093E\u0930 \u0938\u0947 \u0938\u092C\u094D\u0930 \u092A\u094D\u092F\u093E\u0930 \u0939\u0948\u0964 \u0926\u0942\u0938\u0930\u094B\u0902 \u0938\u0947 \u0938\u092C\u094D\u0930 \u0938\u092E\u094D\u092E\u093E\u0928\u0964 \u0916\u0941\u0926 \u0938\u0947 \u0938\u092C\u094D\u0930 \u0906\u0924\u094D\u092E\u0935\u093F\u0936\u094D\u0935\u093E\u0938\u0964", author: "", cats: ["family", "islamic", "wisdom"] },
            { en: "A smile is the best makeup any face can wear.", hi: "\u092E\u0941\u0938\u094D\u0915\u093E\u0928 \u0938\u092C\u0938\u0947 \u0905\u091A\u094D\u091B\u093E \u0936\u094D\u0930\u0943\u0902\u0917\u093E\u0930 \u0939\u0948 \u091C\u094B \u0915\u094B\u0908 \u091A\u0947\u0939\u0930\u093E \u092A\u0939\u0928 \u0938\u0915\u0924\u093E \u0939\u0948\u0964", author: "Marilyn Monroe", cats: ["kindness", "humor"] },
            { en: "Your heart knows the way. Run in that direction.", hi: "\u0906\u092A\u0915\u093E \u0926\u093F\u0932 \u0930\u093E\u0938\u094D\u0924\u093E \u091C\u093E\u0928\u0924\u093E \u0939\u0948\u0964 \u0909\u0938 \u0926\u093F\u0936\u093E \u092E\u0947\u0902 \u0926\u094C\u0921\u093C\u094B\u0964", author: "Rumi", cats: ["courage", "islamic"] },
            { en: "The broken will always be able to love harder than most. Once you've been in the dark, you learn to appreciate everything that shines.", hi: "\u091F\u0942\u091F\u0947 \u0939\u0941\u090F \u0932\u094B\u0917 \u0939\u092E\u0947\u0936\u093E \u0938\u092C\u0938\u0947 \u0917\u0939\u0930\u093E \u092A\u094D\u092F\u093E\u0930 \u0915\u0930\u0924\u0947 \u0939\u0948\u0902\u0964 \u091C\u092C \u0906\u092A \u0905\u0902\u0927\u0947\u0930\u0947 \u092E\u0947\u0902 \u0930\u0939 \u091A\u0941\u0915\u0947 \u0939\u094B, \u0924\u094B \u0939\u0930 \u091A\u092E\u0915\u0924\u0940 \u091A\u0940\u091C\u093C \u0915\u0940 \u0915\u0926\u094D\u0930 \u0915\u0930\u0924\u0947 \u0939\u094B\u0964", author: "", cats: ["healing", "strength"] }
        ];

        var grid = document.getElementById('quotesGrid');
        var filterBar = document.getElementById('filterBar');
        var searchInput = document.getElementById('searchInput');
        var quoteCountEl = document.getElementById('quoteCount');
        var activeFilter = 'all';
        var searchTerm = '';

        function renderQuotes() {
            grid.innerHTML = '';
            var visibleCount = 0, delay = 0;
            quotes.forEach(function(q, i) {
                var cats = q.cats.join(' ');
                if (activeFilter !== 'all' && cats.indexOf(activeFilter) === -1) return;
                if (searchTerm) {
                    var term = searchTerm.toLowerCase();
                    if ((q.en + ' ' + q.hi + ' ' + q.author + ' ' + cats).toLowerCase().indexOf(term) === -1) return;
                }
                visibleCount++;
                var card = document.createElement('div');
                card.className = 'quote-card';
                card.style.animationDelay = (delay * 0.04) + 's';
                delay++;
                var authorLine = q.author ? '<p class="quote-author">' + q.author + '</p>' : '';
                var tags = q.cats.map(function(c) { return '<span class="quote-tag">' + c.charAt(0).toUpperCase() + c.slice(1) + '</span>'; }).join('');
                card.innerHTML =
                    '<div class="quote-mark">\u201C</div>' +
                    '<p class="quote-en">' + q.en + '</p>' +
                    '<div class="quote-hi-wrap"><p class="quote-hi">' + q.hi + '</p></div>' +
                    authorLine +
                    '<div class="quote-footer"><div class="quote-tags">' + tags + '</div><div class="quote-actions">' +
                    '<button class="action-btn copy-btn" data-idx="' + i + '" title="Copy"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9.75a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184"/></svg></button>' +
                    '<button class="action-btn share-btn" data-idx="' + i + '" title="Share"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 2.186 2.25 2.25 0 00-3.935-2.186zm0-12.814a2.25 2.25 0 103.933-2.185 2.25 2.25 0 00-3.933 2.185z"/></svg></button>' +
                    '</div></div>';
                grid.appendChild(card);
            });
            var noResults = grid.querySelector('.no-results');
            if (!noResults) {
                noResults = document.createElement('div');
                noResults.className = 'no-results';
                noResults.innerHTML = '<p class="no-results-text">No quotes found</p><p class="no-results-hint">\u0915\u094B\u0908 \u0909\u0926\u094D\u0927\u0930\u0923 \u0928\u0939\u0940\u0902 \u092E\u093F\u0932\u093E</p>';
                grid.appendChild(noResults);
            }
            noResults.classList.toggle('show', visibleCount === 0);
            var catLabel = activeFilter === 'all' ? 'All' : activeFilter.charAt(0).toUpperCase() + activeFilter.slice(1);
            quoteCountEl.textContent = visibleCount + ' quote' + (visibleCount !== 1 ? 's' : '') + (activeFilter !== 'all' ? ' in ' + catLabel : '') + (searchTerm ? ' matching "' + searchTerm + '"' : '');
        }
        renderQuotes();

        filterBar.addEventListener('click', function(e) {
            var pill = e.target.closest('.filter-pill'); if (!pill) return;
            filterBar.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
            pill.classList.add('active');
            activeFilter = pill.getAttribute('data-cat');
            renderQuotes();
        });

        var searchTimeout;
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() { searchTerm = searchInput.value.trim(); renderQuotes(); }, 200);
        });

        grid.addEventListener('click', function(e) {
            var btn = e.target.closest('.copy-btn'); if (!btn) return;
            var idx = parseInt(btn.getAttribute('data-idx'));
            var q = quotes[idx];
            var text = '"' + q.en + '"\n\n' + q.hi;
            if (q.author) text += '\n\n-- ' + q.author;
            text += '\n\n~ Sukoon';
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(function() {
                    btn.classList.add('copied');
                    btn.innerHTML = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4.5 12.75l6 6 9-13.5"/></svg>';
                    setTimeout(function() {
                        btn.classList.remove('copied');
                        btn.innerHTML = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9.75a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184"/></svg>';
                    }, 2000);
                });
            }
        });

        grid.addEventListener('click', function(e) {
            var btn = e.target.closest('.share-btn'); if (!btn) return;
            var idx = parseInt(btn.getAttribute('data-idx'));
            var q = quotes[idx];
            var text = '"' + q.en + '"\n\n' + q.hi;
            if (q.author) text += '\n\n-- ' + q.author;
            text += '\n\n~ Sukoon';
            if (navigator.share) {
                navigator.share({ title: 'Sukoon Quote', text: text }).catch(function() {});
            } else if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(function() {
                    btn.classList.add('copied');
                    btn.innerHTML = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4.5 12.75l6 6 9-13.5"/></svg>';
                    setTimeout(function() {
                        btn.classList.remove('copied');
                        btn.innerHTML = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 2.186 2.25 2.25 0 00-3.935-2.186zm0-12.814a2.25 2.25 0 103.933-2.185 2.25 2.25 0 00-3.933 2.185z"/></svg>';
                    }, 2000);
                });
            }
        });

        var dailyIdx = -1;
        function showDaily() {
            var next; do { next = Math.floor(Math.random() * quotes.length); } while (next === dailyIdx && quotes.length > 1);
            dailyIdx = next;
            var q = quotes[dailyIdx];
            document.getElementById('dailyEN').textContent = q.en;
            document.getElementById('dailyHI').textContent = q.hi;
            document.getElementById('dailyAuthor').textContent = q.author ? '-- ' + q.author : '';
        }
        showDaily();
        document.getElementById('dailyRefresh').addEventListener('click', showDaily);

        document.getElementById('dailyCopy').addEventListener('click', function() {
            var q = quotes[dailyIdx];
            var text = '"' + q.en + '"\n\n' + q.hi;
            if (q.author) text += '\n\n-- ' + q.author;
            text += '\n\n~ Sukoon';
            var btn = document.getElementById('dailyCopy');
